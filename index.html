<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#22382B">
<title>ШұЩҠШӯШ§ЩҶШ© вҖ” ЩҶШёШ§Щ… Ш§Щ„ШӘШҙШәЩҠЩ„</title>
<meta name="description" content="ЩҶШёШ§Щ… ШӘШҙШәЩҠЩ„ ЩғШ§ЩҒЩҠЩҮ ШұЩҠШӯШ§ЩҶШ© вҖ” ШҘШҜШ§ШұШ© Ш§Щ„ШҙЩҒШӘШ§ШӘ ЩҲШ§Щ„Щ…ЩҮШ§Щ… ЩҲШ§Щ„ШӯШ¶ЩҲШұ">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ШұЩҠШӯШ§ЩҶШ© вҖ” ЩҶШёШ§Щ… Ш§Щ„ШӘШөЩ…ЩҠЩ… v1 (Щ…Щ„ШөЩҲЩӮ ЩғЩ…Ш§ ЩҮЩҲШҢ ЩӮШЁЩ„ CSS Ш§Щ„ЩӮШҜЩҠЩ…)
   ============================================================ */
:root{
  --c-primary-900:#14211A; --c-primary-800:#1A2C22; --c-primary-700:#22382B;
  --c-primary-600:#2C4838; --c-primary-500:#3A5D48; --c-primary-400:#517A5F;
  --c-primary-300:#7C9F89; --c-primary-200:#AFC7B8; --c-primary-100:#D8E4DC; --c-primary-050:#EEF3EF;
  --c-accent-700:#8A560F; --c-accent-600:#B06E1C; --c-accent-500:#D98A2B; --c-accent-300:#E7B265; --c-accent-100:#F6E7CF;
  --c-bg:#F1F4EC; --c-surface:#FCFDFA; --c-surface-2:#EDF1E7; --c-line:#E1E7DB; --c-line-strong:#CFD8CC;
  --c-text-1:#17201A; --c-text-2:#48544B; --c-text-3:#7C877E; --c-text-on:#EDF4EF;
  --c-success:#2F7D4F; --c-success-bg:#E3F1E8; --c-warn:#B57614; --c-warn-bg:#FBEED6;
  --c-danger:#A8352C; --c-danger-bg:#F8E2E0; --c-info:#2C6C8A; --c-info-bg:#DEEDF3;
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-6:24px; --s-8:32px;
  --r-1:10px; --r-2:14px; --r-3:18px; --r-4:24px; --r-full:999px;
  --f:"IBM Plex Sans Arabic","Segoe UI",system-ui,sans-serif;
  --fs-xs:12px; --fs-sm:14px; --fs-md:16px; --fs-lg:20px; --fs-xl:28px;
  --lh-tight:1.25; --lh-normal:1.6;
  --sh-1:0 1px 2px rgba(24,38,28,.05); --sh-2:0 6px 20px rgba(24,38,28,.09); --sh-3:0 14px 36px rgba(24,38,28,.14);
  --t-fast:120ms; --t-base:180ms; --t-slow:240ms; --ease:cubic-bezier(.22,.61,.36,1);
  --tap:48px;
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
/* Ш§Щ„ШЁШ·Ш§ЩӮШ© */
.card--flat{box-shadow:none}
.card--raised{box-shadow:var(--sh-2)}
.card--accent{border-inline-start:3px solid var(--c-accent-500)}
.card--live{border-color:var(--c-primary-300);background:var(--c-primary-050)}
.card__label{font-size:var(--fs-xs);font-weight:500;color:var(--c-text-3);margin-bottom:var(--s-1)}
.card__value{font-size:var(--fs-xl);font-weight:700;color:var(--c-text-1);line-height:1.1}
.card__meta{font-size:var(--fs-sm);color:var(--c-text-3);margin-top:var(--s-1)}
/* Ш§Щ„ШЈШІШұШ§Шұ (Щ…ЩҸШ№ШҜЩҗЩ‘Щ„Ш§ШӘ Ш§Щ„ЩҶШёШ§Щ… Ш§Щ„Ш¬ШҜЩҠШҜ) */
.btn--block{width:100%}
.btn--lg{min-height:56px;font-size:var(--fs-lg)}
.btn--primary{background:var(--c-primary-700);color:var(--c-text-on)}
.btn--secondary{background:var(--c-surface);color:var(--c-primary-700);border-color:var(--c-line-strong)}
.btn--ghost{background:transparent;color:var(--c-primary-600)}
.btn--danger{background:var(--c-danger);color:#fff}
.btn--accent{background:var(--c-accent-500);color:#241A05}
/* ШҙШ§ШұШ§ШӘ Ш§Щ„ШӯШ§Щ„Ш© */
.badge{display:inline-flex;align-items:center;gap:var(--s-2);padding:5px var(--s-3);border-radius:var(--r-full);
  font-size:var(--fs-xs);font-weight:600;line-height:1.4;white-space:nowrap}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;flex:none}
.badge--success{background:var(--c-success-bg);color:var(--c-success)}
.badge--warn{background:var(--c-warn-bg);color:var(--c-warn)}
.badge--danger{background:var(--c-danger-bg);color:var(--c-danger)}
.badge--info{background:var(--c-info-bg);color:var(--c-info)}
.badge--muted{background:var(--c-surface-2);color:var(--c-text-3)}
.badge--live{background:var(--c-primary-100);color:var(--c-primary-700)}
.badge--live::before{animation:rk-pulse 2s var(--ease) infinite}
@keyframes rk-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
/* Skeleton */
.sk{position:relative;overflow:hidden;background:var(--c-surface-2);border-radius:var(--r-1)}
.sk::after{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);
  transform:translateX(-100%);animation:rk-shimmer 1.2s infinite linear}
@keyframes rk-shimmer{to{transform:translateX(100%)}}
.sk--line{height:14px;margin-bottom:var(--s-2)}
.sk--title{height:22px;width:55%;margin-bottom:var(--s-3)}
.sk--w70{width:70%} .sk--w45{width:45%}
.sk--block{height:76px;border-radius:var(--r-3)}
/* ШҙШұЩҠШ· Ш§Щ„ШҙЩҒШӘ */
.shift{background:var(--c-primary-700);color:var(--c-text-on);border-radius:var(--r-3);padding:var(--s-4)}
.shift__top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--s-4)}
.shift__now{font-size:var(--fs-xl);font-weight:700;line-height:1}
.shift__left{font-size:var(--fs-sm);color:var(--c-primary-200)}
.rail{position:relative;height:8px;border-radius:var(--r-full);background:rgba(255,255,255,.16);overflow:hidden}
.rail__fill{position:absolute;inset:0;border-radius:var(--r-full);background:var(--c-accent-500);
  transform-origin:right center;transform:scaleX(0);transition:transform var(--t-slow) var(--ease)}
.rail__marker{position:absolute;top:50%;right:0;width:14px;height:14px;margin:-7px -7px 0 0;border-radius:50%;
  background:#fff;box-shadow:0 0 0 3px var(--c-primary-700);transition:transform var(--t-slow) var(--ease)}
.rail__ends{display:flex;justify-content:space-between;margin-top:var(--s-2);font-size:var(--fs-xs);color:var(--c-primary-200)}
/* ШөЩҒЩҲЩҒ Ш§Щ„ЩӮЩҲШ§ШҰЩ… */
.list{border:1px solid var(--c-line);border-radius:var(--r-3);overflow:hidden}
.row__avatar{width:40px;height:40px;border-radius:var(--r-full);flex:none;background:var(--c-primary-100);
  color:var(--c-primary-700);display:grid;place-items:center;font-weight:600;font-size:var(--fs-sm)}
.row__body{flex:1;min-width:0}
.row__title{font-size:var(--fs-md);font-weight:600;color:var(--c-text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row__sub{font-size:var(--fs-sm);color:var(--c-text-3)}
/* Ш§Щ„ШІШ¬Ш§Ш¬ */
.glass{background:rgba(242,244,240,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
@supports not (backdrop-filter:blur(1px)){.glass{background:var(--c-bg)}}
/* ===== Ш·ШЁЩӮШ© "ШҙШ§ШҙШ© Ш§Щ„ЩҠЩҲЩ…" ЩҒЩӮШ·: ШұЩҒШ№ ШЈЩҲЩ„ЩҲЩҠШ© Щ…ЩғЩҲЩ‘ЩҶШ§ШӘ Ш§Щ„ЩҶШёШ§Щ… Ш§Щ„Ш¬ШҜЩҠШҜ ЩҒЩҲЩӮ Ш§Щ„ЩӮШҜЩҠЩ… ШҜЩҲЩҶ Ш§Щ„Щ…ШіШ§Ші ШЁШ§Щ„ШҙШ§ШҙШ§ШӘ Ш§Щ„ШЈШ®ШұЩү ===== */
.today{display:flex;flex-direction:column;gap:var(--s-3);font-family:var(--f)}
.today .card{background:var(--c-surface);border:1px solid var(--c-line);border-radius:var(--r-3);padding:var(--s-4);box-shadow:var(--sh-1)}
.today .shift{padding:var(--s-4)}
.list .row{min-height:var(--tap);padding:var(--s-3) var(--s-4);background:var(--c-surface);border-bottom:1px solid var(--c-line);flex-wrap:nowrap}
.list .row:last-child{border-bottom:none}
.btn.btn--primary{background:var(--c-primary-700);color:var(--c-text-on);box-shadow:none}
.btn.btn--lg{min-height:56px;font-size:var(--fs-lg)}
.btn.btn--block{width:100%}

/* ============================================================
   CSS Ш§Щ„ЩӮШҜЩҠЩ… (ЩғЩ…Ш§ ЩҮЩҲШҢ ШЁЩ„Ш§ ШӯШ°ЩҒ)
   ============================================================ */
:root{
  color-scheme: light dark;
  --ink:#17201A; --paper:#F1F4EC; --surface:#FCFDFA; --surface-2:#EDF1E7;
  --brand:#245A43; --green:#2C7A55; --green-2:#3C8A63; --green-soft:#E2EEE7; --beige:#EAEEE2;
  --amber:#D98A2B; --amber-2:#E7A24A; --amber-soft:#F6E7CF; --orange:#D98A2B;
  --red:#CF5540; --line:#E1E7DB; --muted:#7A857C;
  --radius:18px;
  --shadow:0 1px 2px rgba(24,38,28,.05), 0 8px 24px rgba(24,38,28,.08);
  --shadow-lg:0 16px 40px rgba(24,38,28,.14);
  --hero:linear-gradient(158deg,#1B4433,#21543F 55%,#2A6249);
  --glass:rgba(252,253,250,.72);
  --font:'Tajawal','IBM Plex Sans Arabic','Segoe UI',Tahoma,Arial,sans-serif;
}
:root[data-theme="dark"]{
  --ink:#E9EEE6; --paper:#0E1310; --surface:#171E18; --surface-2:#212820;
  --brand:#5E9E80; --green:#7FB99C; --green-2:#6FB085; --green-soft:#17281F; --beige:#212820;
  --amber:#E7A85A; --amber-2:#EFB56C; --amber-soft:#2E2415; --orange:#E7A85A;
  --red:#E07360; --line:#28322A; --muted:#8A958B;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 28px rgba(0,0,0,.42);
  --shadow-lg:0 18px 42px rgba(0,0,0,.55);
  --hero:linear-gradient(158deg,#132019,#17281F 60%,#1D3327);
  --glass:rgba(23,30,24,.74);
  --c-bg:#0E1310; --c-surface:#171E18; --c-surface-2:#212820; --c-line:#28322A; --c-line-strong:#38443A;
  --c-text-1:#E9EEE6; --c-text-2:#A7B2A8; --c-text-3:#717C73;
  --c-primary-100:#22322A; --c-primary-050:#182219; --c-success:#4FB584; --c-success-bg:#16281F;
  --c-warn:#DBA353; --c-warn-bg:#2C2415; --c-danger:#E07360; --c-danger-bg:#2E1B17; --c-info:#6BA0DC; --c-info-bg:#152030;
  --sh-1:0 1px 2px rgba(0,0,0,.4); --sh-2:0 6px 20px rgba(0,0,0,.42);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --ink:#E9EEE6; --paper:#0E1310; --surface:#171E18; --surface-2:#212820;
    --brand:#5E9E80; --green:#7FB99C; --green-2:#6FB085; --green-soft:#17281F; --beige:#212820;
    --amber:#E7A85A; --amber-2:#EFB56C; --amber-soft:#2E2415; --orange:#E7A85A;
    --red:#E07360; --line:#28322A; --muted:#8A958B;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 28px rgba(0,0,0,.42);
    --shadow-lg:0 18px 42px rgba(0,0,0,.55);
    --hero:linear-gradient(158deg,#132019,#17281F 60%,#1D3327);
    --glass:rgba(23,30,24,.74);
    --c-bg:#0E1310; --c-surface:#171E18; --c-surface-2:#212820; --c-line:#28322A; --c-line-strong:#38443A;
    --c-text-1:#E9EEE6; --c-text-2:#A7B2A8; --c-text-3:#717C73;
    --c-primary-100:#22322A; --c-primary-050:#182219; --c-success:#4FB584; --c-success-bg:#16281F;
    --c-warn:#DBA353; --c-warn-bg:#2C2415; --c-danger:#E07360; --c-danger-bg:#2E1B17; --c-info:#6BA0DC; --c-info-bg:#152030;
    --sh-1:0 1px 2px rgba(0,0,0,.4); --sh-2:0 6px 20px rgba(0,0,0,.42);
  }
}
.font-lg{font-size:17px} .font-lg .card{padding:16px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:var(--font);background:var(--paper);color:var(--ink);font-size:15.5px;line-height:1.55;
  padding-bottom:calc(96px + env(safe-area-inset-bottom))}
body.no-nav{padding-bottom:0}
h1,h2,h3{margin:0 0 .4em;line-height:1.3;letter-spacing:-.1px}
h3{font-weight:700}
button,input,select,textarea{font-family:inherit;font-size:inherit}
a{color:var(--green)}
.wrap{max-width:640px;margin:0 auto;padding:14px 14px 24px}

/* ===== ЩӮЩҲШі ШұЩҠШӯШ§ЩҶШ© вҖ” Ш§Щ„Ш№ЩҶШөШұ Ш§Щ„Щ…Щ…ЩҠШІ ===== */
.arch{border-radius:120px 120px var(--radius) var(--radius);}
.arch-sm{border-radius:60px 60px 12px 12px;}

/* ===== Ш§Щ„ШӘШұЩҲЩҠШіШ© ===== */
.top{background:var(--hero);color:#F4EFE4;padding:14px 16px 16px;border-radius:0 0 24px 24px;box-shadow:0 6px 20px rgba(20,15,8,.2);
  display:flex;flex-direction:column;gap:11px}
.top .brand{display:flex;align-items:center;gap:11px;min-width:0;width:100%}
.top .brand>.binfo{min-width:0;flex:1}
.logo{display:flex;align-items:center;justify-content:center;user-select:none;flex:0 0 auto}
.logo svg{display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
/* ШҙШ№Ш§Шұ Ш№Щ„Щү ШҙЩғЩ„ ШЈЩҠЩӮЩҲЩҶШ© ШӘШ·ШЁЩҠЩӮ ШЈЩҶЩҠЩӮШ© ЩҒЩҲЩӮ Ш§Щ„ШӘШұЩҲЩҠШіШ© Ш§Щ„ШҜШ§ЩғЩҶШ© */
.top .logo{background:#FBF7EF;border-radius:13px;padding:5px 8px;box-shadow:0 4px 12px rgba(0,0,0,.22);flex:0 0 auto;display:flex;align-items:center}
.top .logo img{display:block;width:auto;filter:none}
.login-hero .logo{background:#FBF7EF;border-radius:24px;padding:16px 22px;box-shadow:0 12px 32px rgba(0,0,0,.24);display:inline-flex}
.top h1{font-size:18.5px;margin:0;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top .sub{font-size:12.5px;opacity:.78;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top .left{display:flex;gap:8px;align-items:center;width:100%;flex-wrap:wrap;justify-content:flex-start}
.top .left .spacer{flex:1}
.dot{width:10px;height:10px;border-radius:50%;background:#7FBF8E;display:inline-block}
.presdot{width:9px;height:9px;border-radius:50%;display:inline-block;background:rgba(255,255,255,.35)}
.presdot.in{background:#7FBF8E;box-shadow:0 0 0 3px rgba(127,191,142,.25)}
.presdot.out{background:var(--red);box-shadow:0 0 0 3px rgba(180,83,58,.25);animation:pulse 1.2s infinite}
.bellbtn{position:relative}
.bellcount{position:absolute;top:-4px;left:-4px;min-width:16px;height:16px;padding:0 3px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;line-height:1}
.dot.off{background:var(--orange);animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.4}}
.pill{background:rgba(255,255,255,.16);border:none;color:var(--paper);border-radius:20px;padding:6px 13px;font-size:12.5px;cursor:pointer;transition:transform .1s, background .15s;font-weight:500}
.pill:active{transform:scale(.92);background:rgba(255,255,255,.28)}
.pill.icbtn{padding:5px 8px;display:inline-flex;align-items:center}
.pill.icbtn svg{width:16px;height:16px}
.spin svg{animation:rot .9s linear infinite}
@keyframes rot{to{transform:rotate(-360deg)}}

/* ===== ШЁШ·Ш§ЩӮШ§ШӘ ===== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin:0 0 12px}
.card.soft{background:var(--green-soft);border-color:transparent}
.card.beige{background:var(--beige);border-color:var(--line)}
.card h3{font-size:15.5px;display:flex;align-items:center;gap:8px}
.muted{color:var(--muted);font-size:13px}
.small{font-size:12.5px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
.center{text-align:center}
hr.sep{border:0;border-top:1px dashed var(--line);margin:12px 0}

/* ===== ШЈШІШұШ§Шұ ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;
  background:linear-gradient(180deg,var(--amber-2),var(--amber));color:#fff;border-radius:13px;padding:12px 16px;font-weight:600;font-size:15px;min-height:46px;
  box-shadow:0 3px 10px rgba(200,130,30,.32)}
.btn:active{transform:scale(.98)}
.btn.block{width:100%}
.btn.green{background:linear-gradient(180deg,var(--green-2),var(--green));box-shadow:0 3px 10px rgba(62,107,76,.28)}
.btn.orange{background:linear-gradient(180deg,var(--amber-2),var(--amber));box-shadow:0 3px 10px rgba(200,130,30,.32)}
.btn.red{background:linear-gradient(180deg,#C26049,var(--red));box-shadow:0 2px 8px rgba(180,83,58,.3)}
.btn.ghost{background:transparent;color:var(--brand);border:1.5px solid var(--line);box-shadow:none;font-weight:600}
.btn.ghost.red{color:var(--red);border-color:var(--red)}
.btn.sm{padding:7px 12px;min-height:36px;font-size:13.5px;border-radius:10px}
.btn[disabled]{opacity:.5;pointer-events:none}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ===== ШҙШ§ШұШ§ШӘ ===== */
.chip{display:inline-block;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;background:var(--surface-2);color:var(--ink);line-height:1.5}
.chip.green{background:var(--green-soft);color:var(--green)}
.chip.orange{background:var(--amber-soft);color:var(--amber)}
.chip.red{background:rgba(192,90,60,.14);color:var(--red)}
.chip.ink{background:var(--brand);color:#F4EFE4}

/* ===== ЩҶЩ…Ш§Ш°Ш¬ ===== */
label.f{display:block;margin:10px 0 4px;font-weight:600;font-size:13.5px}
input.f,select.f,textarea.f{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface);color:var(--ink)}
input.f:focus,select.f:focus,textarea.f:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
textarea.f{min-height:70px;resize:vertical}
.check{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:14.5px}
.check input{width:20px;height:20px;accent-color:var(--green)}

/* ===== Ш§Щ„ШҜШ®ЩҲЩ„ ===== */
.login-hero{background:var(--hero);color:#F4EFE4;padding:38px 18px 48px;text-align:center;border-radius:0 0 36px 36px;box-shadow:0 8px 26px rgba(20,15,8,.2)}
.login-hero .logo{margin:0 auto 12px}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:-26px;padding:0 16px}
.tile{background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);padding:22px 8px 14px;text-align:center;cursor:pointer;font-weight:700;font-size:16px}
.tile .avatar{width:46px;height:46px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;font-weight:700}
.tile:active{transform:scale(.97)}

/* ===== ШӘШЁЩҲЩҠШЁШ§ШӘ ШіЩҒЩ„ЩҠШ© ===== */
nav.bottom{position:fixed;bottom:10px;right:12px;left:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:22px;display:flex;z-index:50;box-shadow:0 10px 30px rgba(20,15,8,.18);
  padding:5px 4px;margin-bottom:env(safe-area-inset-bottom)}
nav.bottom button{flex:1;background:none;border:none;padding:7px 2px 6px;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-radius:16px;transition:background .15s,color .15s}
nav.bottom button .ic{line-height:1;display:flex}
nav.bottom button .ic svg{width:22px;height:22px}
nav.bottom button.on{color:var(--amber);font-weight:700;background:var(--amber-soft)}
nav.bottom .bdg{position:relative}
nav.bottom .bdg::after{content:'';position:absolute;top:4px;left:calc(50% - 16px);width:8px;height:8px;border-radius:50%;background:var(--orange)}

/* ===== ЩҮЩҠЩғЩ„ ШӘШӯЩ…ЩҠЩ„ (ШҙЩҠЩ…Шұ) ===== */
.skel{height:64px;border-radius:14px;margin-bottom:10px;background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:sk 1.1s infinite}
@keyframes sk{to{background-position:-200% 0}}

/* ===== Щ…ЩҮШ§Щ… ===== */
.task{border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:9px;background:var(--surface)}
.task.core{border-right:4px solid var(--amber)}
.task.done{opacity:.65}
.task .t-h{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.task .name{font-weight:700}
.timer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--green)}

/* ===== Ш¶ШәШ· Ш§Щ„Щ…ЩҶШ§Ш·ЩӮ ===== */
.step{display:flex;align-items:center;gap:10px}
.step button{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--amber);background:var(--surface);color:var(--amber);font-size:22px;font-weight:700;cursor:pointer}
.step .val{min-width:64px;text-align:center;font-size:20px;font-weight:700}
.seg{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{flex:1;border:none;background:var(--surface);padding:9px 4px;font-size:13.5px;cursor:pointer;color:var(--ink)}
.seg button.on{background:var(--amber);color:#fff;font-weight:700}

/* ===== Щ…ШіШӘЩҲЩү Щ…ЩҮШ§ШұШ© ===== */
.lvl{display:inline-flex;gap:3px;vertical-align:middle}
.lvl i{width:10px;height:10px;border-radius:50%;background:var(--line)}
.lvl i.on{background:var(--green)}
.lvl i.tr{background:var(--orange)}

/* ===== Ш¬ШҜШ§ЩҲЩ„ ШҘШҜШ§ШұШ© ===== */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{background:var(--surface-2);text-align:right;padding:8px;font-size:12.5px;color:var(--muted);font-weight:700}
.tbl td{border-bottom:1px solid var(--line);padding:7px 8px;vertical-align:top}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ===== ЩӮШ§ШҰЩ…Ш© ШЈЩӮШіШ§Щ… Ш§Щ„ШҘШҜШ§ШұШ© ===== */
.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.menu button{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:14px 4px 11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--ink);position:relative;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s}
.menu button:active{transform:scale(.96)}
.menu button .ic{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--green-soft);color:var(--brand)}
.menu button .ic svg{width:22px;height:22px}
.menu button.g2 .ic{background:var(--amber-soft);color:var(--amber)}
.menu button.g3 .ic{background:var(--surface-2);color:var(--muted)}
.menu button.g4 .ic{background:var(--green-soft);color:var(--brand)}
.menu button .n{position:absolute;top:6px;left:8px;background:var(--red);color:#fff;border-radius:12px;font-size:11px;min-width:20px;text-align:center;padding:1px 6px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* ===== ШӘЩҶШЁЩҠЩҮШ§ШӘ ===== */
.alert{border-radius:14px;padding:11px 13px;margin-bottom:9px;font-size:13.5px;border-right:4px solid;box-shadow:var(--shadow)}
.alert.high{background:var(--surface);border:1px solid var(--line);border-right:4px solid var(--red)}
.alert.mid{background:var(--surface);border:1px solid var(--line);border-right:4px solid var(--amber)}
.alert .impact{display:block;font-size:12px;opacity:.75;margin-top:2px}

/* ===== ЩҶШ§ЩҒШ°Ш© Щ…ЩҶШЁШ«ЩӮШ© ===== */
.overlay{position:fixed;inset:0;background:rgba(34,56,43,.5);z-index:80;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--paper);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;border-radius:24px 24px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18)}
.sheet h3{display:flex;justify-content:space-between;align-items:center}
.x{background:var(--surface-2);border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--muted);line-height:1}

/* ===== ШӘЩҲШіШӘ ===== */
#toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));right:50%;transform:translateX(50%);
  background:#26332B;color:#F4EFE4;border-radius:13px;padding:12px 18px;font-size:14px;z-index:99;
  box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:88%;text-align:center;display:none}
#toast.err{background:var(--red)}
#toast.show{display:block;animation:tin .2s}
@keyframes tin{from{opacity:0;transform:translateX(50%) translateY(8px)}}

.empty{text-align:center;color:var(--muted);padding:24px 8px;font-size:14px}
.sdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:5px;vertical-align:middle}
.sdot.g{background:#4F9E6A}.sdot.o{background:var(--amber)}.sdot.r{background:var(--red)}.sdot.w{background:#9AA0A6}
.tl{position:relative;padding-right:6px}
.tl-i{display:flex;gap:10px;position:relative;padding-bottom:12px}
.tl-i::before{content:'';position:absolute;right:5px;top:14px;bottom:-2px;width:2px;background:var(--line)}
.tl-i:last-child::before{display:none}
.tl-dot{width:12px;height:12px;border-radius:50%;margin-top:3px;flex:0 0 auto;z-index:1;background:var(--amber)}
.tl-dot.g{background:#4F9E6A}.tl-dot.o{background:var(--amber)}.tl-dot.r{background:var(--red)}.tl-dot.w{background:#9AA0A6}
.tl-c{flex:1;font-size:13.5px}.tl-t{color:var(--muted);font-size:12px;margin-bottom:2px}
.recog{background:var(--amber-soft);border:1px solid transparent}
.moodb{flex:1;margin:0 3px;border:1.5px solid var(--line);background:var(--surface);border-radius:12px;padding:9px 0;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:transform .12s,border-color .15s,background .15s,color .15s}
.moodb:active{transform:scale(.9)}
.moodb svg{display:block}
@media(hover:hover) and (pointer:fine){.moodb:hover{color:var(--amber);border-color:var(--amber-soft)}}
.moodb.on{border-color:var(--amber);background:var(--amber-soft);color:var(--amber)}

/* ===== ШӘШӯШіЩҠЩҶШ§ШӘ Ш№Ш§Щ…Ш© ===== */
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,.tile:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.btn{transition:filter .15s, transform .1s}
.btn:hover{filter:brightness(1.05)}
.btn.busy{opacity:.6;pointer-events:none;position:relative}
.overlay{animation:fadeIn .18s}
@keyframes fadeIn{from{background:rgba(34,56,43,0)}}
.sheet{animation:slideUp .22s ease-out}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}}
.tbl tr:nth-child(even) td{background:var(--surface-2)}
.card{transition:box-shadow .2s}

/* ===== ЩғШ§Щ…ЩҠШұШ§ ЩҲШҙШұЩҠШ· Ш§Щ„ШҘЩҶШ¬Ш§ШІ ===== */
.camwrap{background:#000;border-radius:14px;overflow:hidden}
.camwrap video{width:100%;max-height:55vh;display:block;object-fit:cover}
.pbar{height:9px;background:var(--line);border-radius:6px;margin-top:8px;overflow:hidden}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#7FBF8E);border-radius:6px;transition:width .35s}

/* ===== ШҘШӯШөШ§ШҰЩҠШ§ШӘ Щ„ЩҲШӯШ© Ш§Щ„ШҘШҜШ§ШұШ© ===== */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);padding:13px 6px;text-align:center;
  cursor:pointer;font-family:inherit;color:inherit;transition:transform .12s, box-shadow .12s}
.stat:active{transform:scale(.95)}
.stat:hover{box-shadow:0 4px 18px rgba(34,56,43,.14)}
.stat .v{font-size:24px;font-weight:800;color:var(--amber);font-variant-numeric:tabular-nums}
.stat.warn .v{color:var(--orange)}
.stat.bad .v{color:var(--red)}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}

@media(min-width:520px){.tiles{grid-template-columns:repeat(3,1fr)}}

/* ===== Щ„Щ…ШіШ§ШӘ ШіШӯШ§ШЁЩҠШ© вҖ” Ш№Щ…ЩӮ ЩҲШІШ¬Ш§Ш¬ ЩҲШӯШұЩғШ© ЩҶШ§Ш№Щ…Ш© ===== */
html{scroll-behavior:smooth}
::selection{background:var(--amber-soft);color:var(--ink)}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.vin{animation:viewIn .24s cubic-bezier(.22,.61,.36,1)}
nav.bottom button .ic svg{transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
nav.bottom button.on .ic svg{transform:translateY(-2px) scale(1.12)}
nav.bottom button.on{position:relative}
.card,.menu button,.stat,.tile,.task{transition:transform .18s cubic-bezier(.22,.61,.36,1),box-shadow .22s ease,border-color .18s}
@supports ((backdrop-filter:blur(10px)) or (-webkit-backdrop-filter:blur(10px))){
  nav.bottom{background:var(--glass);-webkit-backdrop-filter:saturate(1.5) blur(16px);backdrop-filter:saturate(1.5) blur(16px)}
}
/* ШӘЩҲЩҮШ¬ ШҜШ§ЩҒШҰ Ш®ЩҒЩҠЩҒ Ш№Щ„Щү Ш§Щ„ШӘШұЩҲЩҠШіШ© ЩҲШҙШ§ШҙШ© Ш§Щ„ШҜШ®ЩҲЩ„ вҖ” ШҘШӯШіШ§Ші ШӘШ·ШЁЩҠЩӮ ШіШӯШ§ШЁЩҠ */
.top,.login-hero{position:relative;overflow:hidden;isolation:isolate}
.top::after,.login-hero::after{content:'';position:absolute;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(130% 90% at 88% -20%,rgba(224,137,31,.30),transparent 55%),radial-gradient(90% 70% at 5% 120%,rgba(127,191,142,.16),transparent 60%)}
/* ШұЩҒШ№ Ш§Щ„ШЁШ·Ш§ЩӮШ§ШӘ Ш№ЩҶШҜ Ш§Щ„ШӘЩ…ШұЩҠШұ Ш№Щ„Щү Ш§Щ„ШЈШ¬ЩҮШІШ© Ш°Ш§ШӘ Ш§Щ„Щ…ШӨШҙШұ */
@media(hover:hover) and (pointer:fine){
  .card:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(60,45,20,.13)}
  .menu button:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(60,45,20,.15);border-color:transparent}
  .tile:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(60,45,20,.15)}
  .stat:hover{transform:translateY(-2px)}
  .btn.ghost:hover{border-color:var(--amber);color:var(--amber)}
  .task:hover{border-color:var(--amber-soft)}
}
/* Щ…ЩӮШЁШ¶ ШіШӯШЁ ШЈЩҶЩҠЩӮ ШЈШ№Щ„Щү Ш§Щ„ЩҶШ§ЩҒШ°Ш© Ш§Щ„Щ…ЩҶШЁШ«ЩӮШ© */
.sheet::before{content:'';display:block;width:40px;height:4px;border-radius:3px;background:var(--line);margin:-4px auto 14px;opacity:.9}
/* Ш№ЩҶЩҲШ§ЩҶ Ш§Щ„ЩҶШ§ЩҒШ°Ш© ЩҠШЁЩӮЩү ШёШ§ЩҮШұШ§ЩӢ ШЈШ«ЩҶШ§ШЎ Ш§Щ„ШӘЩ…ШұЩҠШұ */
.sheet>h3:first-of-type{position:sticky;top:0;z-index:2;background:var(--paper);padding-block:4px;margin-top:-2px}
/* ШЈЩҠЩӮЩҲЩҶШ§ШӘ Ш§Щ„ЩӮШ§ШҰЩ…Ш© ШӘШӘЩҲЩҮШ¬ ШЁЩ„Ш·ЩҒ */
.menu button .ic{transition:transform .18s ease}
@media(hover:hover) and (pointer:fine){.menu button:hover .ic{transform:scale(1.08)}}
/* ШӯЩҲШ§ЩҒ ЩҶШ§Ш№Щ…Ш© Щ„Щ„ШөЩҲШұ Ш§Щ„Щ…Ш¶Щ…Щ‘ЩҶШ© */
.sheet img{border-radius:12px}
/* ШҙШұЩҠШ· Ш№Щ„ЩҲЩҠ Щ…ШӘШҜШұЩ‘Ш¬ ШұЩҒЩҠШ№ ЩғШҘШ·Ш§Шұ Ш№Щ„Ш§Щ…Ш© */
.login-hero .logo,.top .brand{position:relative;z-index:1}

/* ===== ШІШұ Ш§Щ„ШӘШ®Ш§Ш·ШЁ Ш§Щ„ШөЩҲШӘЩҠ (Push-to-Talk) ===== */
.ptt-wrap{position:fixed;left:14px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:60;display:flex;flex-direction:column;align-items:center;gap:7px}
.ptt-target{border:none;background:rgba(38,51,43,.92);color:#F4EFE4;border-radius:16px;padding:5px 11px;font-size:11.5px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.28);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptt-target:active{transform:scale(.95)}
.ptt{width:52px;height:52px;border-radius:50%;border:none;
  background:linear-gradient(180deg,var(--amber-2),var(--amber));color:#fff;box-shadow:0 6px 18px rgba(200,130,30,.45);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;transition:transform .12s,box-shadow .18s}
.ptt .ic svg{width:24px;height:24px}
.ptt .ptt-l{font-size:9.5px;font-weight:800;letter-spacing:.2px}
.ptt:active{transform:scale(.94)}
.ptt.rec{background:linear-gradient(180deg,#E4573C,#C0392B);transform:scale(1.6);box-shadow:0 0 0 10px rgba(224,87,60,.22),0 10px 26px rgba(192,57,43,.55);animation:pttpulse 1s infinite}
@keyframes pttpulse{50%{box-shadow:0 0 0 18px rgba(224,87,60,.05),0 10px 26px rgba(192,57,43,.55)}}
.ptt.speaking{background:linear-gradient(180deg,var(--green-2),var(--green));box-shadow:0 0 0 7px rgba(62,107,76,.2),0 8px 22px rgba(62,107,76,.45)}
.ptt-toast{position:fixed;left:14px;bottom:calc(154px + env(safe-area-inset-bottom));z-index:60;background:#26332B;color:#F4EFE4;border-radius:12px;
  padding:8px 13px;font-size:12.5px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,.32);display:none;max-width:62vw}
.ptt-toast.show{display:block;animation:tin .2s}
.btn.rec{background:linear-gradient(180deg,#E4573C,#C0392B)!important;box-shadow:0 0 0 4px rgba(224,87,60,.18)!important}
/* ШәШ·Ш§ШЎ ШӘШіШ¬ЩҠЩ„ ЩғШЁЩҠШұ ЩҲЩҲШ§Ш¶Шӯ */
.rec-ov{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(20,15,8,.55);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);pointer-events:none}
.rec-ov.show{display:flex;animation:fadeIn .15s}
.rec-card{background:linear-gradient(180deg,#E4573C,#C0392B);color:#fff;border-radius:28px;padding:32px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45);min-width:230px}
.rec-mic{width:96px;height:96px;margin:0 auto 14px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;animation:recpulse 1s infinite}
.rec-mic svg{width:46px;height:46px;stroke:#fff}
.rec-txt{font-size:22px;font-weight:800}
.rec-sub{font-size:14px;opacity:.92;margin-top:4px}
@keyframes recpulse{50%{box-shadow:0 0 0 18px rgba(255,255,255,.10)}}
.ptt-toast.tap{cursor:pointer;background:var(--green);font-size:14.5px;padding:13px 18px;font-weight:800}
.task:active{transform:scale(.992)}
@media(hover:hover) and (pointer:fine){.task:hover{box-shadow:0 4px 16px rgba(60,45,20,.08)}}

/* Щ…Ш°ЩғШұШ© ШөЩҲШӘЩҠШ© Щ…ШҙШӘШұЩғШ© */
.vnote{margin:8px 0 4px}
.vn-rec{display:flex;align-items:center;gap:9px;width:100%;justify-content:center;padding:11px 14px;border-radius:14px;border:1.5px dashed var(--line);background:var(--surface-2);color:var(--ink);font-weight:700;font-size:14px;cursor:pointer;transition:background .15s,border-color .15s}
.vn-rec svg{width:20px;height:20px;stroke:var(--brand)}
.vn-rec:disabled{opacity:.6;cursor:default}
.vn-rec.on{background:linear-gradient(180deg,#E4573C,#C0392B);border-color:transparent;color:#fff;animation:vnpulse 1.1s infinite}
.vn-rec.on svg{stroke:#fff}
@keyframes vnpulse{50%{box-shadow:0 0 0 7px rgba(224,87,60,.18)}}
.vn-body{margin-top:8px;display:flex;align-items:center;gap:10px}
.vn-audio{flex:1;height:38px;max-width:100%}
.vn-del{background:none;border:none;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;padding:6px;flex:none}
.vn-play{display:flex;align-items:center;gap:9px;margin:9px 0;padding:8px 10px;border-radius:12px;background:var(--surface-2);flex-wrap:wrap}
.vn-play .vn-ic{width:34px;height:34px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;flex:none}
.vn-play .vn-ic svg{width:18px;height:18px;stroke:var(--green)}
.vn-play audio{flex:1;min-width:170px;height:36px;max-width:100%}
.vn-cap{font-size:12px;color:var(--muted);font-weight:700;width:100%}
/* ШЁШ·Ш§ЩӮШ© ШӘШіЩ„ЩҠЩ… Ш§Щ„ШҙЩҒШӘ Ш§Щ„Ш°ЩғЩҠШ© */
.card.hb{background:var(--green-soft);border-color:var(--green-2)}
.hb-h{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:800;font-size:15px;color:var(--brand)}
.hb-badge{font-size:10.5px;font-weight:700;background:var(--brand);color:#fff;border-radius:20px;padding:3px 9px;white-space:nowrap}
.hb-shift{font-size:13px;color:var(--muted);font-weight:700;margin:2px 0 8px}

function sheet(title, html, onOpen){
  var ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML='<div class="sheet"><h3><span>'+esc(title)+'</span><button class="x" aria-label="ШҘШәЩ„Ш§ЩӮ">вң•</button></h3><div class="sh-body">'+html+'</div></div>';
  ov.addEventListener('click', function(e){ if(e.target===ov) close(); });
  $('.x',ov).addEventListener('click', close);
  function onKey(e){ if(e.key==='Escape') close(); }
  document.addEventListener('keydown', onKey);
  var prevOverflow=document.body.style.overflow;
  document.body.style.overflow='hidden';
  function close(){
    if(ov.parentNode) ov.parentNode.removeChild(ov);
    document.removeEventListener('keydown', onKey);
    document.body.style.overflow=prevOverflow;
  }
  document.body.appendChild(ov);
  if(onOpen) onOpen(ov, close);
  return close;
}

  sheet(title, '<div class="cdlg-txt">'+msg+'</div>'+
    '<div class="btnrow"><button class="btn block'+(danger?' red':'')+'" id="cdY">'+esc(yesLabel||'ШӘШЈЩғЩҠШҜ')+'</button>'+
    '<button class="btn ghost" id="cdN">ШҘЩ„ШәШ§ШЎ</button></div>',
    function(ov, close){
      $('#cdY',ov).addEventListener('click', function(){ close(); onYes(); });
      $('#cdN',ov).addEventListener('click', close);
    });
}
function inputSheet(title, label, placeholder, goLabel, onGo, optional){
  sheet(title,
    '<label class="f">'+esc(label)+(optional?' <span class="muted small">(Ш§Ш®ШӘЩҠШ§ШұЩҠ)</span>':'')+'</label>'+
    '<textarea class="f" id="inS" placeholder="'+esc(placeholder||'')+'"></textarea>'+
    '<div class="btnrow"><button class="btn block" id="inGo">'+esc(goLabel||'ШҘШұШіШ§Щ„')+'</button></div>',
    function(ov, close){
      $('#inGo',ov).addEventListener('click', function(){
        var v=$('#inS',ov).value.trim();
        if(!v && !optional){ toast('Ш§ЩғШӘШЁЩҠ Ш§Щ„ЩҶШө ШЈЩҲЩ„Ш§ЩӢ', true); return; }
        close(); onGo(v);

}

/* ---------- Щ…ЩҶШ№ Ш§Щ„ШҘШұШіШ§Щ„ Ш§Щ„Щ…ШІШҜЩҲШ¬ ---------- */
function busyWrap(btn, work){
  if(btn.classList.contains('busy')) return;
  btn.classList.add('busy');
  var p; try{ p=work(); }catch(e){ btn.classList.remove('busy'); throw e; }
  if(p && p.then) p.then(function(){ btn.classList.remove('busy'); }, function(){ btn.classList.remove('busy'); });
  else btn.classList.remove('busy');
  return p;
}

/* ---------- Ш¶ШәШ· ШөЩҲШұШ© (ЩғШ§Щ…ЩҠШұШ§ вҶ’ JPEG ШөШәЩҠШұ) ---------- */
function pickPhoto(cb){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.addEventListener('change', function(){
    var f=inp.files && inp.files[0]; if(!f) return;
    var img=new Image(), url=URL.createObjectURL(f);
    img.onload=function(){
      var max=800, w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      cb(c.toDataURL('image/jpeg',0.7));
    };
    img.onerror=function(){ URL.revokeObjectURL(url); toast('ШӘШ№Ш°Шұ ЩӮШұШ§ШЎШ© Ш§Щ„ШөЩҲШұШ©', true); };
    img.src=url;
  });
  inp.click();
}

  }catch(e){ return 'no-storage'; }
}

/* ---------- ШҘШҙШ№Ш§ШұШ§ШӘ Ш§Щ„ШҜЩҒШ№ (Web Push) ---------- */
function b64ToU8(base64){
  var pad='='.repeat((4-base64.length%4)%4);
  var b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  var raw=atob(b), arr=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
function enablePush(vapid, cb){
  if(!('serviceWorker' in navigator) || !('PushManager' in window) || !vapid){ if(cb)cb(false); return; }
  Notification.requestPermission().then(function(perm){
    if(perm!=='granted'){ if(cb)cb(false); return; }
    navigator.serviceWorker.ready.then(function(reg){
      reg.pushManager.getSubscription().then(function(sub){
        var p = sub ? Promise.resolve(sub) : reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:b64ToU8(vapid)});
        p.then(function(s){
          var j=s.toJSON(), act=(S.role==='admin')?'push_admin_subscribe':'push_subscribe';
          var fn=(S.role==='admin')?aAct:sAct;
          fn(act, {endpoint:j.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth, ua:navigator.userAgent}, false)
            .then(function(){ toast('ЩҒЩҸШ№Щ‘Щ„ШӘ Ш§Щ„ШҘШҙШ№Ш§ШұШ§ШӘ вң”'); if(cb)cb(true); });
        }).catch(function(){ if(cb)cb(false); });
      });
    });
  }).catch(function(){ if(cb)cb(false); });
}

/* ---------- ЩғШ§Щ…ЩҠШұШ§ Щ…ШЁШ§ШҙШұШ© (Щ„Ш§ Ш§ШіШӘЩҲШҜЩҠЩҲ): Щ„Щ„ШӘШӯЩӮЩӮ ЩҲШӘЩҲШ«ЩҠЩӮ Ш§Щ„Щ…ЩҮШ§Щ… ---------- */
function cameraSheet(opts, cb){
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
    toast('Ш§Щ„ЩғШ§Щ…ЩҠШұШ§ ШәЩҠШұ Щ…ШҜШ№ЩҲЩ…Ш© Ш№Щ„Щү ЩҮШ°Ш§ Ш§Щ„Щ…ШӘШөЩҒШӯ', true);
    if(opts.onFail) opts.onFail();
    return;
  }
  var stream=null;
  function stopCam(){ if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; } }
  sheet(opts.title||'Ш§Щ„ШӘШөЩҲЩҠШұ Ш§Щ„Щ…ШЁШ§ШҙШұ',
    '<div class="camwrap"><video id="camV" autoplay playsinline muted></video></div>'+
    '<div class="muted small center" style="margin-top:6px">ШӘШөЩҲЩҠШұ Щ…ШЁШ§ШҙШұ ЩҒЩӮШ· вҖ” Щ„Ш§ ЩҠЩ…ЩғЩҶ Ш§Щ„Ш§Ш®ШӘЩҠШ§Шұ Щ…ЩҶ Ш§Щ„Ш§ШіШӘЩҲШҜЩҠЩҲШҢ ЩҲШӘЩҸШ®ШӘЩ… Ш§Щ„ШөЩҲШұШ© ШЁШ§Щ„ЩҲЩӮШӘ</div>'+
    '<div class="btnrow"><button class="btn block" id="camGo">Ш§Щ„ШӘЩӮШ§Ш·</button></div>',
    function(ov, closeFn){
      var xb=$('.x',ov); if(xb) xb.addEventListener('click', stopCam);
      ov.addEventListener('click', function(e){ if(e.target===ov) stopCam(); });
      navigator.mediaDevices.getUserMedia({video:{facingMode:opts.facing||'environment', width:{ideal:1024}}, audio:false})
        .then(function(st){ stream=st; var v=$('#camV',ov); if(v) v.srcObject=st; else stopCam(); })
        .catch(function(){
          stopCam(); closeFn();
          toast('ЩҠШ¬ШЁ Ш§Щ„ШіЩ…Ш§Шӯ ШЁШ§Щ„ЩғШ§Щ…ЩҠШұШ§ вҖ” ЩҮШ°ЩҮ Ш§Щ„Ш№Щ…Щ„ЩҠШ© ШӘШӘШ·Щ„ШЁ ШӘШөЩҲЩҠШұШ§ЩӢ Щ…ШЁШ§ШҙШұШ§ЩӢ', true);
          if(opts.onFail) opts.onFail();
        });
      $('#camGo',ov).addEventListener('click', function(){
        var v=$('#camV',ov);
        if(!stream || !v || !v.videoWidth){ toast('Ш§Щ„ЩғШ§Щ…ЩҠШұШ§ Щ„Щ… ШӘШ¬ЩҮШІ ШЁШ№ШҜ вҖ” Щ„ШӯШёШ©', true); return; }
        var max=800, w=v.videoWidth, h=v.videoHeight;
        if(w>h && w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        var ctx=cv.getContext('2d'); ctx.drawImage(v,0,0,w,h);
        ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,h-26,w,26);
        ctx.fillStyle='#fff'; ctx.font='13px sans-serif'; ctx.textAlign='right'; ctx.direction='rtl';
        ctx.fillText((opts.watermark||'')+' В· '+new Date().toLocaleString('ar-JO'), w-8, h-8);
        stopCam(); closeFn(); cb(cv.toDataURL('image/jpeg',0.72));
      });
    });
}

function getGeo(cb){
  if(!navigator.geolocation){ cb(null); return; }
  var done=false;
  var t=setTimeout(function(){ if(!done){ done=true; cb(null); } }, 6500);
  navigator.geolocation.getCurrentPosition(function(pos){
    if(done) return; done=true; clearTimeout(t);
    cb({lat:+pos.coords.latitude.toFixed(6), lng:+pos.coords.longitude.toFixed(6), acc:Math.round(pos.coords.accuracy||0)});
  }, function(){
    if(done) return; done=true; clearTimeout(t); cb(null);
  }, {enableHighAccuracy:true, timeout:6000, maximumAge:30000});
}
/* Ш§Щ„ШӯШ¶ЩҲШұ/Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ ШЁЩ„Щ…ШіШ© ЩҲШ§ШӯШҜШ©: ЩҠЩҲШ«ЩҺЩ‘ЩӮ ШЁЩ…Ш№ШұЩ‘ЩҒ Ш§Щ„Ш¬ЩҮШ§ШІ ЩҲШ§Щ„Щ…ЩҲЩӮШ№ ШӘЩ„ЩӮШ§ШҰЩҠШ§ЩӢ.
   ЩғЩ„Щ…Ш© Ш§Щ„ШіШұ ШЈЩҲ Ш§Щ„ШөЩҲШұШ© ШӘЩҸШ·Щ„ШЁШ§ЩҶ ЩҒЩӮШ· ШҘШ°Ш§ ЩҒШ№Щ‘Щ„ШӘЩҮЩ…Ш§ Ш§Щ„ШҘШҜШ§ШұШ© Щ…ЩҶ Ш§Щ„ШҘШ№ШҜШ§ШҜШ§ШӘ. */
function doAttendance(kind, pin, selfie){
  var isOut = kind==='out';
  var sel='[data-a="'+(isOut?'checkout':'checkin')+'"]';
  $$(sel).forEach(function(b){ b.classList.add('busy'); });
  getGeo(function(geo){
    var p={geo:geo, device_token:devTok(), device_id:devId()};
    if(pin) p.pin=pin;
    if(selfie) p.selfie=selfie;
    sAct(isOut?'check_out':'check_in', p, false).then(function(res){
      $$(sel).forEach(function(b){ b.classList.remove('busy'); });
      if(res.ok){
        if(navigator.vibrate) navigator.vibrate(35);
        if(res.dup) toast('Щ…ШіШ¬Щ‘Щ„ Щ…ШіШЁЩӮШ§ЩӢ');
        else if(res.unscheduled) toast('ШіЩҸШ¬Щ‘Щ„ ШӯШ¶ЩҲШұЩғ (ШәЩҠШұ Щ…Ш¬ШҜЩҲЩ„) вҖ” ШіЩҠШёЩҮШұ Щ„Щ„ШҘШҜШ§ШұШ©');
        else if(isOut){ toast('ШіЩҸШ¬Щ‘Щ„ Ш§ЩҶШөШұШ§ЩҒЩғ вҖ” ЩҠШ№Ш·ЩҠЩғ Ш§Щ„Ш№Ш§ЩҒЩҠШ©'); shiftEndCelebrate(); }
        else toast('ШөШЁШ§Шӯ Ш§Щ„ЩҶШҙШ§Ш· ШіЩҸШ¬Щ‘Щ„ ШӯШ¶ЩҲШұЩғ');
        refresh();
      } else if(res.blockers){
        sheet('Щ„Ш§ ЩҠЩ…ЩғЩҶ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ ШЁШ№ШҜ','<ul style="padding-right:18px">'+res.blockers.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul><div class="muted small">ШЈЩҶЩҮЩҠ ЩҮШ°ЩҮ Ш§Щ„ЩҶЩӮШ§Ш· Ш«Щ… ШЈШ№ЩҠШҜЩҠ Ш§Щ„Щ…ШӯШ§ЩҲЩ„Ш©.</div>');
      } else if(res.need_pin){
        pinSheet(kind, selfie);
      } else if((res.error||'').indexOf('ШөЩҲШұШ© Ш§Щ„ШӘШӯЩӮЩӮ')>-1){
        cameraSheet({facing:'user', title:'ШөЩҲШұШ© Ш§Щ„ШӘШӯЩӮЩӮ Ш§Щ„Щ…ШЁШ§ШҙШұШ©', watermark:(S.me?S.me.name:'')+(isOut?' В· Ш§ЩҶШөШұШ§ЩҒ':' В· ШӯШ¶ЩҲШұ')},
          function(d){ doAttendance(kind, pin, d); });
      } else toast(res.error||'Ш®Ш·ШЈ', true);
    }).catch(function(){ $$(sel).forEach(function(b){ b.classList.remove('busy'); }); });
  });
}
function pinSheet(kind, selfie){
  sheet('ШӘШЈЩғЩҠШҜ Ш§Щ„ЩҮЩҲЩҠШ©',
    '<div class="muted small">Ш§Щ„ШҘШҜШ§ШұШ© ЩҒШ№Щ‘Щ„ШӘ Ш·ШЁЩӮШ© ШӘШӯЩӮЩӮ ШҘШ¶Ш§ЩҒЩҠШ© вҖ” ШЈШҜШ®Щ„ЩҠ ЩғЩ„Щ…Ш© ШіШұЩғ.</div>'+
    '<label class="f">ЩғЩ„Щ…Ш© Ш§Щ„ШіШұ</label><input class="f" id="apn" type="password" inputmode="numeric" autocomplete="off">'+
    '<div class="btnrow"><button class="btn block" id="apnGo">ШӘШЈЩғЩҠШҜ</button></div>',
    function(ov, close){
      var inp=$('#apn',ov); setTimeout(function(){ inp.focus(); },100);
      function go(){ if(!inp.value){ toast('ШЈШҜШ®Щ„ЩҠ ЩғЩ„Щ…Ш© ШіШұЩғ', true); return; } close(); doAttendance(kind, inp.value, selfie); }
      $('#apnGo',ov).addEventListener('click', go);
      inp.addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
    });
}

  if(!sh){
    out.push('<div class="card soft arch center" style="padding:26px 14px"><h3 style="justify-content:center">Щ„Ш§ ЩҠЩҲШ¬ШҜ ШҙЩҒШӘ Щ…Ш¬ШҜЩҲЩ„ Щ„ЩғЩҗ Ш§Щ„ЩҠЩҲЩ…</h3>'+
      '<div class="muted">ШҘЩҶ ЩғЩҶШӘЩҗ ЩҒЩҠ Ш§Щ„ЩғШ§ЩҒЩҠЩҮ ЩҒШ№Щ„Ш§ЩӢ ШіШ¬Щ„ЩҠ ШӯШ¶ЩҲШұШ§ЩӢ ШәЩҠШұ Щ…Ш¬ШҜЩҲЩ„ вҖ” ЩҠЩҸШіШ¬ЩҺЩ‘Щ„ ЩҲЩӮШӘЩғ Ш§Щ„ЩҒШ№Щ„ЩҠ ЩҲЩҠШёЩҮШұ Щ„Щ„ШҘШҜШ§ШұШ©.</div>'+
      '<div class="btnrow" style="justify-content:center"><button class="btn btn--primary btn--block btn--lg" data-a="checkin">ШӘШіШ¬ЩҠЩ„ ШӯШ¶ЩҲШұ ШәЩҠШұ Щ…Ш¬ШҜЩҲЩ„ вң”</button>'+
      '<button class="btn ghost block" data-a="goMore">Щ…ШұШ§ШіЩ„Ш© Ш§Щ„ШҘШҜШ§ШұШ© / Ш·Щ„ШЁ ШҘШ¬Ш§ШІШ©</button></div></div>');
    return '<section class="today">'+out.join('')+'</section>';
  }
  var now=Date.now(), s0=new Date(sh.start).getTime(), e0=new Date(sh.end).getTime();
  var total=Math.max(1,e0-s0), pct=Math.min(1,Math.max(0,(now-s0)/total)), left;
  if(now<s0) left='ЩҠШЁШҜШЈ '+fmtT(sh.start);
  else if(now>=e0) left='Ш§ЩҶШӘЩҮЩү Ш§Щ„ШҙЩҒШӘ';
  else { var lm=Math.round((e0-now)/60000); left='ШЁШ§ЩӮЩҚ '+(lm>=60?Math.floor(lm/60)+' Ші '+(lm%60)+' ШҜ':lm+' ШҜ'); }
  var shiftBar='<div class="shift">'+
    '<div class="shift__top"><div class="shift__now num">'+fmtT(Date.now())+'</div><div class="shift__left">'+esc(left)+'</div></div>'+
    '<div class="rail" style="--pct:'+pct.toFixed(3)+'"><div class="rail__fill" style="transform:scaleX(var(--pct))"></div><div class="rail__marker" style="right:calc(var(--pct)*100%)"></div></div>'+
    '<div class="rail__ends"><span class="num">'+fmtT(sh.start)+'</span><span class="num">'+fmtT(sh.end)+'</span></div></div>';

  /* ===== Ш§Щ„Щ…ШұШӯЩ„Ш© 1: ЩӮШЁЩ„ ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШӯШ¶ЩҲШұ ===== */
  if(!inT){
    out.push(shiftBar);
    out.push('<div class="card"><h3>'+esc(sh.name)+' В· '+esc(sh.area||'')+((sh.extra_areas&&sh.extra_areas.length)?' + '+sh.extra_areas.map(esc).join(' + '):'')+'</h3>'+
      '<div class="muted">'+fmtT(sh.start)+' вҶ’ '+fmtT(sh.end)+' В· Ш§ШіШӘШұШ§ШӯШ© '+mins(sh.break_minutes)+(sh.break_parts>1?' ('+sh.break_parts+' ШЈШ¬ШІШ§ШЎ)':'')+'</div>'+
      (sh.daily_role?'<div style="margin-top:6px"><span class="chip ink">ШҜЩҲШұЩғ Ш§Щ„ЩҠЩҲЩ…: '+esc(sh.daily_role)+'</span></div>':'')+'</div>');
    out.push('<button class="btn btn--primary btn--block btn--lg" data-a="checkin">ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШӯШ¶ЩҲШұ вң”</button>');
    return '<section class="today">'+out.join('')+'</section>';
  }

  /* ===== ШЁШ№ШҜ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ ===== */
  if(outT){
    out.push(shiftBar);
    out.push('<div class="card center soft" style="padding:22px 14px"><h3 style="justify-content:center">ШЈЩҸШәЩ„ЩӮ ЩҠЩҲЩ…Щғ вң”</h3>'+
      '<div class="muted">ШӯШ¶ЩҲШұ '+fmtT(inT)+' вҶ’ Ш§ЩҶШөШұШ§ЩҒ '+fmtT(outT)+(att.overtime>0?' В· ШҘШ¶Ш§ЩҒЩҠ '+mins(att.overtime):'')+'</div>'+
      '<div class="muted small" style="margin-top:6px">ШӘШ№ШЁШӘЩҗ Щ…Ш№ЩҶШ§ Ш§Щ„ЩҠЩҲЩ… вҖ” ШҙЩғШұШ§ЩӢ Щ„ЩғЩҗ</div></div>');
    return '<section class="today">'+out.join('')+'</section>';
  }

  var order={opening:0,during:1,adhoc:2,closing:3};
  var pendAll=(st.tasks||[]).filter(function(t){return ['done','approved','carried','cancelled'].indexOf(t.status)<0;})
    .sort(function(a,b){
      var pa=(a.wf_priority&&a.wf_priority.total)||0, pb=(b.wf_priority&&b.wf_priority.total)||0;
      if(pb!==pa) return pb-pa;
      return (order[a.phase]==null?9:order[a.phase])-(order[b.phase]==null?9:order[b.phase]);
    });
  var nearEnd = now >= e0 - 75*60000;

  /* ===== Ш§Щ„Щ…ШұШӯЩ„Ш© 3: ЩӮШұШЁ ЩҶЩҮШ§ЩҠШ© Ш§Щ„ШҙЩҒШӘ вҖ” ЩҲШ¶Ш№ Ш§Щ„ШҘШәЩ„Ш§ЩӮ ===== */
  if(nearEnd){
    var closing=pendAll.filter(function(t){return t.phase==='closing';});
    var otherPend=pendAll.filter(function(t){return t.phase!=='closing';});
    out.push(shiftBar);
    out.push('<div class="ht-k" style="margin:2px 2px 0">ЩҲШ¶Ш№ Ш§Щ„ШҘШәЩ„Ш§ЩӮ вҖ” Ш§Щ„Щ…ШӘШЁЩӮЩ‘ЩҠ ЩӮШЁЩ„ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ</div>');
    if(closing.length){ out.push(heroTaskCard(closing[0]));
      if(closing.length>1) out.push('<div class="list">'+closing.slice(1).map(function(t){return '<div class="row"><div class="row__body"><div class="row__title">'+esc(t.name)+'</div><div class="row__sub">ШҘШәЩ„Ш§ЩӮ В· '+mins(t.expected)+'</div></div><span class="badge badge--warn">ЩӮШ§ШҜЩ…Ш©</span></div>';}).join('')+'</div>');
    }
    if(otherPend.length) out.push('<div class="card decision" style="padding:11px 14px"><b>'+otherPend.length+' Щ…ЩҮЩ…Ш© Щ„Щ… ШӘЩҸШәЩ„ЩӮ ШЁШ№ШҜ</b><div class="muted small">ШұШ§Ш¬Ш№ЩҠЩҮШ§ Щ…ЩҶ В«Ш§Щ„Щ…ЩҮШ§Щ…В» ЩӮШЁЩ„ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ</div><div class="btnrow"><button class="btn sm ghost" data-a="goTasks">ЩҒШӘШӯ Ш§Щ„Щ…ЩҮШ§Щ…</button></div></div>');
    if(sh.requires_handover && !st.handover_sent)
      out.push('<div class="card decision" style="padding:12px 14px"><b>ШӘШіЩ„ЩҠЩ… Ш§Щ„ШҙЩҒШӘ</b><div class="muted small">ШіЩ„Щ‘Щ…ЩҠ Ш§Щ„ШҙЩҒШӘ Щ„ШІЩ…ЩҠЩ„Ш© Щ…ЩҲШ¬ЩҲШҜШ© ЩӮШЁЩ„ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ вҖ” ШӘШЈЩғЩҠШҜЩҮШ§ ШҙШұШ·.</div><div class="btnrow"><button class="btn block" data-a="hoNew">ШӘШ№ШЁШҰШ© ЩҶЩ…ЩҲШ°Ш¬ Ш§Щ„ШӘШіЩ„ЩҠЩ…</button></div></div>');
    out.push(dashBreak());
    out.push(dashOps('due'));
    out.push('<button class="btn btn--primary btn--block btn--lg" data-a="checkout">ШӘШіШ¬ЩҠЩ„ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ</button>');
    return '<section class="today">'+out.join('')+'</section>';
  }

  /* ===== Ш§Щ„Щ…ШұШӯЩ„Ш© 2: ШЈШ«ЩҶШ§ШЎ Ш§Щ„ШҙЩҒШӘ ===== */
  if(pendAll.length) out.push(heroTaskCard(pendAll[0]));
  else out.push('<div class="card center soft" style="padding:16px"><b>Щ„Ш§ Щ…ЩҮШ§Щ… Щ…Ш·Щ„ЩҲШЁШ© Щ…ЩҶЩғ Ш§Щ„ШўЩҶ</b><div class="muted small">ШЈЩҶШ¬ШІШӘЩҗ ЩғЩ„ ШҙЩҠШЎ вҖ” Ш§ШіШӘШ№ШҜЩҠ Щ„ШЈЩҠ ЩҶШҜШ§ШЎ</div></div>');
  out.push(shiftBar);
  out.push(dashBreak());
  var up=pendAll.slice(1,3);
  if(up.length) out.push('<div class="list">'+up.map(function(t){
      return '<div class="row"><div class="row__body"><div class="row__title">'+esc(t.name)+'</div><div class="row__sub">'+esc(PHASE[t.phase]||'')+' В· '+mins(t.expected)+'</div></div><span class="badge badge--muted">ЩӮШ§ШҜЩ…Ш©</span></div>';
    }).join('')+'</div>'+
    '<div class="center" style="margin:2px 0 4px"><button class="btn sm ghost" data-a="goTasks">ЩғЩ„ Ш§Щ„Щ…ЩҮШ§Щ… ('+pendAll.length+')</button></div>');
  out.push(dashOps('due'));
  out.push('<div class="btnrow"><button class="btn ghost block" data-a="checkout">ШӘШіШ¬ЩҠЩ„ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ</button></div>');
  return '<section class="today">'+out.join('')+'</section>';
}
/* ===== Щ…ШӯШ·Ш© Ш§Щ„ШӘШӯШ¶ЩҠШұ вҖ” ШӘШёЩҮШұ ЩҒЩӮШ· Щ„Щ…ЩҶ Щ„ШҜЩҠЩҮШ§ ШЈШөЩҶШ§ЩҒ Ш¶Щ…ЩҶ Щ…ЩҶШ·ЩӮШӘЩҮШ§ ===== */
function prepRemain(exp){ var ms=new Date(exp).getTime()-Date.now(); if(ms<=0) return 'Щ…ЩҶШӘЩҮЩҠШ©';
  var h=Math.floor(ms/3600000); if(h>=24) return 'ШЁШ§ЩӮЩҚ '+Math.floor(h/24)+' ЩҠЩҲЩ…'+(h%24? ' ЩҲ'+(h%24)+'Ші':''); if(h>=1) return 'ШЁШ§ЩӮЩҚ '+h+' ШіШ§Ш№Ш©'; return 'ШЁШ§ЩӮЩҚ '+Math.max(1,Math.round(ms/60000))+' ШҜ'; }
function loadPrepCard(){
  var w=$('#prepWrap'); if(!w) return;
  sAct('prep_list',{}).then(function(r){
    var items=(r&&r.items)||[];
    if(!items.length){ w.innerHTML=''; return; }
    var html='<div class="card"><h3>Щ…ШӯШ·Ш© Ш§Щ„ШӘШӯШ¶ЩҠШұ</h3><div class="muted small" style="margin-bottom:6px">Ш§Щ„ШҙШ§ЩҒШ§ШӘ Ш§Щ„Щ…ШӯШ¶Щ‘ШұШ© ЩҲШөЩ„Ш§ШӯЩҠШӘЩҮШ§ вҖ” Ш§ЩғШӘШЁЩҠ ШұЩӮЩ… Ш§Щ„ШҙШ§ЩҒ Ш№Щ„Щү Щ„Ш§ШөЩӮ Ш§Щ„Ш№ШЁЩҲШ©.</div>';
    items.forEach(function(it){
      html+='<div style="padding:7px 0;border-bottom:1px dashed var(--line)"><div class="row" style="justify-content:space-between"><b>'+esc(it.name)+'</b><button class="btn sm ghost" data-prepadd="'+it.id+'" data-nm="'+esc(it.name)+'">+ ШҙШ§ЩҒ</button></div>';
      if((it.batches||[]).length){
        html+='<div class="row" style="margin-top:5px">'+it.batches.map(function(b){
          var cls=b.state==='expired'?'red':(b.state==='near'?'orange':'green');
          return '<button class="chip '+cls+'" data-prepb="'+b.id+'" data-item="'+esc(it.name)+'" style="border:none;cursor:pointer">Шҙ-'+b.id+' В· '+prepRemain(b.expires_at)+(b.cosigned?' вң“вң“':'')+'</button>';
        }).join('')+'</div>';
      } else html+='<div class="muted small" style="margin-top:3px">Щ„Ш§ ШҙШ§ЩҒШ§ШӘ вҖ” ЩҠЩ„ШІЩ… ШӘШӯШ¶ЩҠШұ</div>';
      html+='</div>';
    });
    html+='</div>';
    w.innerHTML=html;
    $$('[data-prepadd]',w).forEach(function(bt){ bt.addEventListener('click', function(){
      var iid=+bt.getAttribute('data-prepadd'), nm=bt.getAttribute('data-nm');
      sheet('ШҙШ§ЩҒ Ш¬ШҜЩҠШҜ: '+nm,
        '<label class="f">Ш§Щ„ЩғЩ…ЩҠШ© (Ш§Ш®ШӘЩҠШ§ШұЩҠ)</label><input class="f" id="ppQty" type="number" step="0.5" placeholder="Щ…Ш«Ш§Щ„: 2">'+
        '<div class="btnrow"><button class="btn block" id="ppGo">ШіШ¬Щ‘Щ„ЩҠ Ш§Щ„ШҙШ§ЩҒ</button></div>',
        function(ov, close){
          $('#ppGo',ov).addEventListener('click', function(){
            busyWrap(this, function(){ return sAct('prep_add',{item_id:iid, qty:$('#ppQty',ov).value||null}, true).then(function(r2){
              if(!r2.ok){ toast(r2.error||'Ш®Ш·ШЈ',true); return; }
              close();
              sheet('Ш§ЩғШӘШЁЩҠ Ш№Щ„Щү Ш§Щ„Щ„Ш§ШөЩӮ','<div class="center" style="padding:8px 0"><div style="font-size:44px;font-weight:800;color:var(--amber)">'+esc(r2.code)+'</div><div class="muted small" style="margin-top:6px">Ш§ЩғШӘШЁЩҠ ЩҮШ°Ш§ Ш§Щ„ШұЩ…ШІ ЩҲШӘШ§ШұЩҠШ® Ш§Щ„ЩҠЩҲЩ… Ш№Щ„Щү Щ„Ш§ШөЩӮ Ш§Щ„Ш№ШЁЩҲШ©</div></div>');
              loadPrepCard();
            }); });
          });
        });
    }); });
    $$('[data-prepb]',w).forEach(function(bt){ bt.addEventListener('click', function(){
      var bid=+bt.getAttribute('data-prepb'), inm=bt.getAttribute('data-item');
      var binfo=null; items.forEach(function(it){ (it.batches||[]).forEach(function(b){ if(b.id===bid) binfo=b; }); });
      if(!binfo) return;
      var stTxt=binfo.state==='expired'?'<span class="chip red">Щ…ЩҶШӘЩҮЩҠШ© вҖ” Щ„Ш§ ШӘЩҸШіШӘШ®ШҜЩ…</span>':(binfo.state==='near'?'<span class="chip orange">ШӘЩӮШ§ШұШЁ Ш§Щ„Ш§ЩҶШӘЩҮШ§ШЎ</span>':'<span class="chip green">Ш·Ш§ШІШ¬Ш©</span>');
      sheet('ШҙШ§ЩҒ Шҙ-'+bid+' В· '+esc(inm),
        '<div class="row" style="justify-content:space-between"><span>Ш§Щ„ШӯШ§Щ„Ш©</span>'+stTxt+'</div>'+
        '<div class="row" style="justify-content:space-between;margin-top:6px"><span class="muted">ШӯШ¶Щ‘ШұШӘЩҮШ§</span><b>'+esc(binfo.by)+'</b></div>'+
        '<div class="row" style="justify-content:space-between;margin-top:4px"><span class="muted">ШӘЩҶШӘЩҮЩҠ</span><b>'+fmtD(binfo.expires_at)+' '+fmtT(binfo.expires_at)+'</b></div>'+
        (!binfo.mine && !binfo.cosigned ? '<div class="card soft" style="margin-top:10px;padding:9px 12px"><div class="small">ШӘШЈЩғШҜШӘЩҗ ШЈЩҶЩҮШ§ Щ…ШәШ·Ш§Ш© ЩҲЩ…ЩҲШіЩҲЩ…Ш© ЩҲШ·Ш§ШІШ¬Ш©Шҹ ЩҲЩӮЩ‘Ш№ЩҠ ШӘЩҲЩӮЩҠШ№ Ш§Щ„Ш¬ЩҲШҜШ© Ш§Щ„Ш«Ш§ЩҶЩҠ вҖ” ЩҠЩҸШӯШіШЁ Щ„ЩғЩ…Ш§ Щ…Ш№Ш§ЩӢ.</div><div class="btnrow"><button class="btn sm" id="ppCo">ШӘЩҲЩӮЩҠШ№ Ш§Щ„Ш¬ЩҲШҜШ© вң“вң“</button></div></div>' : '')+
        '<div class="btnrow" style="margin-top:10px"><button class="btn sm ghost" id="ppFin">Ш®Щ„ШөШӘ (Ш§ШіШӘЩҸЩҮЩ„ЩғШӘ)</button><button class="btn sm ghost red" id="ppDis">ШҘШӘЩ„Ш§ЩҒ</button></div>',
        function(ov, close){
          var co=$('#ppCo',ov); if(co) co.addEventListener('click', function(){ busyWrap(this, function(){ return sAct('prep_cosign',{id:bid},true).then(function(r3){ toast(r3.msg||'ШӘЩ…'); close(); loadPrepCard(); }); }); });
          $('#ppFin',ov).addEventListener('click', function(){ busyWrap(this, function(){ return sAct('prep_close',{id:bid,outcome:'finished'},true).then(function(){ close(); loadPrepCard(); }); }); });
          $('#ppDis',ov).addEventListener('click', function(){
            inputSheet('ШҘШӘЩ„Ш§ЩҒ Ш§Щ„ШҙШ§ЩҒ','ШіШЁШЁ Ш§Щ„ШҘШӘЩ„Ш§ЩҒ','Щ…Ш«Ш§Щ„: Ш§ЩҶШӘЩҮШӘ Ш§Щ„ШөЩ„Ш§ШӯЩҠШ©','ШӘШЈЩғЩҠШҜ Ш§Щ„ШҘШӘЩ„Ш§ЩҒ',function(why){
              sAct('prep_close',{id:bid,outcome:'discarded',note:why||''},true).then(function(){ toast('ШіЩҸШ¬Щ‘Щ„ ЩҒЩҠ ШіШ¬Щ„ Ш§Щ„ЩҮШҜШұ'); close(); loadPrepCard(); });
            }, true);
          });
        });
    }); });
  }).catch(function(){});
}

/* ===== Щ…ШҙШұЩҒ Ш§Щ„ШҙЩҒШӘ Ш§Щ„ШұЩӮЩ…ЩҠ вҖ” Ш¬Ш§ЩҮШІЩҠШ© Ш§Щ„Ш§ЩҒШӘШӘШ§ШӯШҢ ШіЩ„Ш§Щ…Ш© Ш§Щ„ШӯШұШ§ШұШ©ШҢ ШӘЩҲШ«ЩҠЩӮ Ш§Щ„ШҘШәЩ„Ш§ЩӮ ===== */
function opsChecklistHtml(title, icon, items, closing){
  var crit=items.filter(function(i){return i.critical;});
  var critOk=crit.filter(function(i){return i.status==='ok';}).length;
  var done=crit.length && critOk===crit.length;
  var anyFail=items.some(function(i){return i.status==='fail';});
  var h='<div class="card ops"><div class="ops-h">'+icon+'<span>'+title+'</span>'+
    (done?'<span class="chip green">'+(closing?'Щ…ЩғШӘЩ…Щ„ вң”':'Ш¬Ш§ЩҮШІ вң”')+'</span>':'<span class="chip '+(anyFail?'red':'orange')+'">'+critOk+'/'+crit.length+'</span>')+'</div>';
  if(done){
    h+='<div class="ops-ok">'+(closing?'ШӘЩ… ШӘЩҲШ«ЩҠЩӮ ШҘШәЩ„Ш§ЩӮ Ш§Щ„Щ…ЩҶШ·ЩӮШ© ШЁШ§ШіЩ…ЩғЩҗ вң”':'Ш§Щ„Щ…ЩҶШ·ЩӮШ© Ш¬Ш§ЩҮШІШ© Щ„Ш§ШіШӘЩӮШЁШ§Щ„ Ш§Щ„Ш¶ЩҠЩҲЩҒ вң”')+'</div>';
    if(anyFail) h+='<div class="muted small" style="margin-top:4px">ШЁЩҶШҜ ШәЩҠШұ Щ…Ш·Ш§ШЁЩӮ ШұЩҸЩҒШ№ Щ„Щ„ШҘШҜШ§ШұШ©.</div>';
  } else {

function viewTasks(){
  var st=S.state, tasks=st.tasks||[], out=[];
  var hasChores=(st.recurring||[]).length>0;
  if(!tasks.length && !hasChores) return '<div class="empty">Щ„Ш§ Щ…ЩҮШ§Щ… Щ„Щ„ЩҠЩҲЩ… вҖ” ШӘЩҸЩҲЩ„ЩҺЩ‘ШҜ ШӘЩ„ЩӮШ§ШҰЩҠШ§ЩӢ Ш№ЩҶШҜ ЩҲШ¬ЩҲШҜ ШҙЩҒШӘ ЩҲЩ…ЩҶШ·ЩӮШ©</div>';
  var doneL=tasks.filter(function(t){return t.status==='done'||t.status==='approved';});
  var pct=tasks.length?Math.round(100*doneL.length/tasks.length):0;
  if(tasks.length) out.push('<div class="card" style="padding:10px 12px"><div class="row" style="justify-content:space-between"><b>ШҘЩҶШ¬Ш§ШІ Ш§Щ„ЩҠЩҲЩ…</b><span class="chip '+(pct===100?'green':pct>=50?'':'orange')+'">'+doneL.length+'/'+tasks.length+'</span></div><div class="pbar"><i style="width:'+pct+'%"></i></div></div>');
  // ЩӮШіЩ…Ш© ШіЩҠШ§ЩӮЩҠШ©: Ш§Щ„ШҘШәЩ„Ш§ЩӮ В«ЩӮШ§ШҜЩ…В» ШӯШӘЩү ШўШ®Шұ 75 ШҜЩӮЩҠЩӮШ© Щ…ЩҶ Ш§Щ„ШҙЩҒШӘ
  var sh=st.shift, nearEnd = sh ? (Date.now() >= new Date(sh.end).getTime() - 75*60000) : true;
  var pend=tasks.filter(function(t){return ['done','approved','carried','cancelled'].indexOf(t.status)<0;});
  var nowL=pend.filter(function(t){return nearEnd || t.phase!=='closing';});
  var laterL=pend.filter(function(t){return !nearEnd && t.phase==='closing';});
  out.push('<h3 style="margin:14px 2px 8px">Ш§Щ„ШўЩҶ</h3>');
  if(nowL.length) nowL.forEach(function(t){ out.push(taskCard(t)); });
  else if(!hasChores) out.push('<div class="card muted small center">Щ„Ш§ Щ…ЩҮШ§Щ… Щ…Ш·Щ„ЩҲШЁШ© Ш§Щ„ШўЩҶ</div>');
  if(hasChores) out.push(dashOps('chores'));
  if(laterL.length){
    out.push('<h3 style="margin:14px 2px 8px">ЩӮШ§ШҜЩ…Ш©</h3><div class="list">'+laterL.map(function(t){
      return '<div class="row"><div class="row__body"><div class="row__title">'+esc(t.name)+'</div><div class="row__sub">'+esc(PHASE[t.phase]||'')+' В· '+mins(t.expected)+(t.is_core?' В· ШЈШіШ§ШіЩҠШ©':'')+'</div></div><span class="badge badge--muted">ЩҒЩҠ ЩҲЩӮШӘЩҮШ§</span></div>';
    }).join('')+'</div>');
  }
  if(doneL.length){
    out.push('<details class="qa" style="margin-top:14px"><summary>Щ…ЩғШӘЩ…Щ„Ш© <span class="chip green">'+doneL.length+'</span></summary><div class="qa-body"><div class="list">'+doneL.map(function(t){
      return '<div class="row"><div class="row__body"><div class="row__title" style="color:var(--muted)">'+esc(t.name)+'</div><div class="row__sub">'+esc(PHASE[t.phase]||'')+'</div></div><span class="badge badge--success">'+(t.status==='approved'?'Щ…Ш№ШӘЩ…ШҜШ©':'Щ…ЩҶШ¬ШІШ©')+'</span></div>';
    }).join('')+'</div></div></details>');
  }
  return out.join('');
}

  else if(t.status==='paused') html+='<button class="btn sm" data-a="tResume" data-id="'+t.id+'">Ш§ШіШӘШҰЩҶШ§ЩҒ</button>'+
                    '<button class="btn sm ghost" data-a="tDone" data-id="'+t.id+'">ШҘЩҶЩҮШ§ШЎ вң”</button>';
  html+='</div></div>';

function updateTimers(){
  $$('.timer').forEach(function(el){
    var brk=el.getAttribute('data-brk');
    if(brk){ var bs=(Date.now()-new Date(brk).getTime())/1000;
      if(bs>=1800){ el.style.color='var(--red)'; el.textContent=secFmt(bs)+' вҖ” Ш§ЩҶШӘЩҮШӘ (30 ШҜ)'; }

var COVST={open:'Щ…ЩҒШӘЩҲШӯ',pending:'ШЁШ§ЩҶШӘШёШ§Шұ Ш§Щ„ШҘШҜШ§ШұШ©',approved:'Ш§Ш№ШӘЩҸЩ…ШҜ',rejected:'Щ…ШұЩҒЩҲШ¶',cancelled:'Щ…Щ„ШәЩү'};
function openCover(){
  Promise.all([sAct('cover_board',{}), sAct('cover_mine',{})]).then(function(rs){
    var board=(rs[0]&&rs[0].rows)||[], mine=(rs[1]&&rs[1].rows)||[];
    var html='<div class="btnrow"><button class="btn block" id="cvNew">ШЈШӯШӘШ§Ш¬ ШӘШәШ·ЩҠШ© / ШӘШЁШҜЩҠЩ„ ШҙЩҒШӘ</button></div>'+
      '<h3 style="margin-top:14px">Ш·Щ„ШЁШ§ШӘ ЩҠЩ…ЩғЩҶЩғЩҗ ШӘШәШ·ЩҠШӘЩҮШ§</h3>'+
      (board.length? board.map(function(c){
        return '<div class="card" style="padding:10px 12px"><b>'+esc(c.requester)+'</b> вҖ” '+fmtD(c.day)+' '+fmtHM(c.start)+'вҶ’'+fmtHM(c.end)+(c.area?' В· '+esc(c.area):'')+(c.kind==='swap'?' <span class="chip">ШӘШЁШҜЩҠЩ„</span>':'')+(c.reason?'<div class="small muted">'+esc(c.reason)+'</div>':'')+'<div class="btnrow"><button class="btn sm" data-cvtake="'+c.id+'" data-kind="'+c.kind+'">'+(c.kind==='swap'?'ШЈШЁШ§ШҜЩ„':'ШЈШәШ·Щ‘ЩҠ')+'</button></div></div>';
      }).join('') : '<div class="muted small">Щ„Ш§ Ш·Щ„ШЁШ§ШӘ Щ…ЩҒШӘЩҲШӯШ© ШӯШ§Щ„ЩҠШ§ЩӢ</div>')+
      '<h3 style="margin-top:14px">Ш·Щ„ШЁШ§ШӘЩҠ</h3>'+
      (mine.length? mine.map(function(c){
        return '<div class="card" style="padding:9px 12px"><b>'+fmtD(c.day)+'</b> '+(c.kind==='swap'?'<span class="chip">ШӘШЁШҜЩҠЩ„</span> ':'')+'<span class="chip '+(c.status==='approved'?'green':c.status==='rejected'?'red':'')+'">'+(COVST[c.status]||c.status)+'</span>'+(c.volunteer?'<div class="small">Ш§Щ„Щ…ШӘШ·ЩҲШ№Ш©: '+esc(c.volunteer)+'</div>':'')+(c.status==='open'?'<div class="btnrow"><button class="btn sm ghost red" data-cvcancel="'+c.id+'">ШҘЩ„ШәШ§ШЎ</button></div>':'')+'</div>';
      }).join('') : '<div class="muted small">Щ„Ш§ Ш·Щ„ШЁШ§ШӘ Щ„ЩғЩҗ</div>');
    sheet('ШӘШЁШҜЩҠЩ„ ЩҲШӘШәШ·ЩҠШ© Ш§Щ„ШҙЩҒШӘШ§ШӘ', html, function(ov, close){
      $('#cvNew',ov).addEventListener('click', function(){ close(); coverNew(); });
      $$('[data-cvtake]',ov).forEach(function(b){ b.addEventListener('click', function(){
        var id=+b.getAttribute('data-cvtake'), kind=b.getAttribute('data-kind');
        if(kind==='swap'){ close(); coverTakeSwap(id); }
        else busyWrap(b, function(){ return sAct('cover_take',{id:id},true).then(function(r){ if(r.ok){ toast('Ш№ШұШ¶ЩғЩҗ ЩҲШөЩ„ Щ„Щ„ШҘШҜШ§ШұШ© Щ„Щ„Ш§Ш№ШӘЩ…Ш§ШҜ вң”'); close(); } else toast(r.error||'Ш®Ш·ШЈ',true); }); });
      }); });
      $$('[data-cvcancel]',ov).forEach(function(b){ b.addEventListener('click', function(){
        busyWrap(b, function(){ return sAct('cover_cancel',{id:+b.getAttribute('data-cvcancel')},true).then(function(){ close(); openCover(); }); });
      }); });
    });
  });
}

    var html='<label class="f">Ш§Щ„ШҙЩҒШӘ</label><select class="f" id="cvSh">'+sh.map(function(s){return '<option value="'+s.id+'">'+fmtD(s.day)+' В· '+fmtHM(s.start)+'вҶ’'+fmtHM(s.end)+(s.area?' В· '+esc(s.area):'')+'</option>';}).join('')+'</select>'+
      '<label class="f">Ш§Щ„ЩҶЩҲШ№</label><select class="f" id="cvKind"><option value="cover">ШӘШәШ·ЩҠШ© (ШӘШЈШ®Ш° ШІЩ…ЩҠЩ„Ш© ШҙЩҒШӘЩҠ)</option><option value="swap">ШӘШЁШҜЩҠЩ„ (ШЈШЁШҜЩ‘Щ„ ШЁШҙЩҒШӘ ШІЩ…ЩҠЩ„Ш©)</option></select>'+

      });
    });
  });

    /* Ш¶ШәШ· Ш§Щ„Щ…ЩҶШ§Ш·ЩӮ вҖ” Щ…ЩҶ ШўШ®Шұ ШӘШӯШҜЩҠШ« Щ„ЩғЩ„ Щ…ЩҶШ·ЩӮШ© Ш§Щ„ЩҠЩҲЩ… */

      $$('[data-wfov]',wfEl).forEach(function(b){ b.addEventListener('click', function(){

          aAct('wf_override',{id:+b.getAttribute('data-wfov'), reason:reason}).then(function(r){ if(r.ok){ toast('ШіЩҸШ¬Щ‘Щ„ Ш§Щ„ШӘШ¬Ш§ЩҲШІ вң”'); } else toast(r.error||'Ш®Ш·ШЈ',true); });
        });

function mapAction(a){ return {absence:'absence',pressure:'reports',skills:'skills',breaks:'attendance',tasks:'tasks',handovers:'handovers',requests:'requests',attendance:'attendance',training:'training',flags:'flags',coverage:'absence'}[a]||'dash'; }

var ADMIN={};

/* ---------- Щ…ШұЩғШІ Ш§Щ„ЩӮШұШ§ШұШ§ШӘ + Ш§Щ„ШӯЩҲШ§ШҜШ« (Ш§Щ„Щ…Ш¬Щ„ШҜ Ш§Щ„ШұШ§ШЁШ№) ---------- */
ADMIN.ocdecisions=function(v){
  var SEVL={critical:{t:'ШӯШұШ¬',c:'red'},warning:{t:'ШӘШӯШ°ЩҠШұ',c:'orange'},info:{t:'Щ…Ш№Щ„ЩҲЩ…Ш©',c:''},emergency:{t:'Ш·Ш§ШұШҰ',c:'red'}};
  var STL={open:'Ш¬ШҜЩҠШҜ',approved:'Ш§Ш№ШӘЩҸЩ…ШҜ',postponed:'Щ…ШӨШ¬ЩҺЩ‘Щ„',dismissed:'Щ…ЩҸШіШӘШЁШ№ЩҺШҜ',overridden:'ШӘШ¬Ш§ЩҲШІШӘЩҮ Ш§Щ„Щ…Ш§Щ„ЩғШ©',info_requested:'Ш·Щ„ШЁ ШӘЩҲШ¶ЩҠШӯ'};
  function incCard(x){ var s=SEVL[x.severity]||SEVL.info;
    return '<div class="card" style="padding:10px 12px;border-inline-start:4px solid var(--'+(s.c||'line')+')"><div class="row" style="justify-content:space-between"><b>'+esc(x.type)+'</b><span class="chip '+s.c+'">'+s.t+'</span></div>'+
      '<div class="muted small" style="margin-top:2px">'+esc(x.affected||'')+' В· Щ…ЩҶШ° '+fmtT(x.since)+(x.auto_close?'':' В· Щ„Ш§ ЩҠЩҸШәЩ„ЩӮ ШӘЩ„ЩӮШ§ШҰЩҠШ§ЩӢ')+'</div></div>'; }
  function decCard(x){ var s=SEVL[x.severity]||SEVL.info, acts='';
    if(x.needs_action){ acts='<div class="btnrow" style="margin-top:8px">'+
      '<button class="btn sm" data-ocd="approve" data-id="'+x.id+'">Ш§Ш№ШӘЩ…Ш§ШҜ</button>'+
      '<button class="btn sm ghost" data-ocd="override" data-id="'+x.id+'" data-to="'+esc(x.to_state||'')+'">ШӘШ¬Ш§ЩҲШІ Щ…Ш№ ШіШЁШЁ</button>'+

      '<button class="btn sm ghost" data-ocd="dismiss" data-id="'+x.id+'">Ш§ШіШӘШЁШ№Ш§ШҜ</button></div>'; }
    else { acts='<div class="muted small" style="margin-top:6px">Ш§Щ„ШӯШ§Щ„Ш©: '+(STL[x.oc_status]||x.oc_status)+(x.override_reason?' вҖ” В«'+esc(x.override_reason)+'В»':'')+'</div>'; }
    return '<div class="card decision" style="padding:12px'+(x.severity==='critical'?';border-inline-start-color:var(--red)':x.severity==='warning'?';border-inline-start-color:var(--amber)':'')+'">'+
      '<div class="row" style="justify-content:space-between"><b>'+esc(x.type_label)+'</b><span class="chip '+s.c+'">'+s.t+'</span></div>'+
      '<div style="margin-top:3px;font-size:14px">'+esc(x.affected||'')+(x.employee?' В· '+esc(x.employee):'')+'</div>'+
      '<div class="muted small" style="margin-top:4px">Ш§Щ„ШӘЩҲШөЩҠШ©: '+esc(x.recommendation||'')+'</div>'+
      '<div class="muted small">Ш§Щ„ШЈШ«Шұ Ш§Щ„Щ…ШӘЩҲЩӮШ№: '+esc(x.impact||'')+'</div>'+
      '<div class="muted small num" style="margin-top:2px">'+fmtT(x.ts)+'</div>'+acts+'</div>'; }
  function wire(scope){ $$('[data-ocd]',scope).forEach(function(b){ b.addEventListener('click',function(){
      var act=b.getAttribute('data-ocd'), id=+b.getAttribute('data-id');

/* ---------- Щ…ШұЩғШІ Ш§Щ„ШӘШӯЩ„ЩҠЩ„Ш§ШӘ (Ш§Щ„Щ…Ш¬Щ„ШҜ Ш§Щ„ШұШ§ШЁШ№) ---------- */
ADMIN.ocanalytics=function(v){
  var preset=7;
  function bar(label,val){ var col = val>=80?'':(val>=50?'var(--amber)':'var(--red)');
    return '<div style="margin:0 0 8px"><div class="row" style="justify-content:space-between;font-size:13px"><span>'+esc(label)+'</span><span class="num" style="font-weight:800">'+val+'</span></div>'+
      '<div class="pbar"><i style="width:'+Math.max(0,Math.min(100,val))+'%'+(col?';background:'+col:'')+'"></i></div></div>'; }
  function tile(label,val,sub,ins){ return '<div class="card" style="padding:10px 12px"><div class="muted small">'+esc(label)+'</div>'+
    '<div class="num" style="font-size:20px;font-weight:800">'+(ins?'вҖ”':esc(val))+'</div><div class="muted small">'+(ins?'ШЁЩҠШ§ЩҶШ§ШӘ ШәЩҠШұ ЩғШ§ЩҒЩҠШ©':esc(sub||''))+'</div></div>'; }
  function render(r){
    var h=r.health, c=h.components, out=[];
    var hc = h.score>=80?'green':h.score>=60?'':'orange', hl=h.score>=80?'Ш¬ЩҠШҜ':h.score>=60?'Щ…ЩӮШЁЩҲЩ„':'ЩҠШӯШӘШ§Ш¬ Щ…ШұШ§Ш¬Ш№Ш©';
    out.push('<div class="card" style="padding:14px"><div class="row" style="justify-content:space-between;align-items:flex-end">'+
      '<div><div class="muted small">Щ…ШӨШҙШұ Ш§Щ„ШөШӯШ© Ш§Щ„ШӘШҙШәЩҠЩ„ЩҠШ©</div><div class="num" style="font-size:38px;font-weight:900;line-height:1">'+h.score+'<span style="font-size:15px;color:var(--muted)"> / 100</span></div></div>'+
      '<span class="chip '+hc+'">'+hl+'</span></div><div style="margin-top:12px">'+
      bar('ЩғЩҒШ§ЩҠШ© Ш§Щ„Ш·Ш§ЩӮЩ…',c.staffing)+bar('ШҘШӘЩ…Ш§Щ… Ш§Щ„Щ…ЩҮШ§Щ… Ш§Щ„ШӯШұШ¬Ш©',c.critical)+bar('ШІЩ…ЩҶ ШұЩҒШ№ Ш§Щ„Щ…ЩҲШ§ЩҶШ№',c.blocker)+bar('Ш§Щ„ШӯЩ…Щ„ Ш§Щ„Щ…ШӘШЈШ®Шұ',c.overdue)+bar('Ш§ШіШӘЩӮШұШ§Шұ Ш§Щ„Щ…ШұШ§ШӯЩ„',c.phase)+
      '</div><div class="muted small" style="margin-top:6px">Ш§Щ„ЩҒШӘШұШ© '+esc(r.period.from)+' вҶ’ '+esc(r.period.to)+' В· '+r.period.tasks+' Щ…ЩҮЩ…Ш© (Ш§Щ„Щ…Щ„ШәШ§Ш© Щ…ШіШӘШ«ЩҶШ§Ш©)</div></div>');
    if((r.findings||[]).length){ out.push('<h3 style="margin:14px 2px 8px">ШЈЩҮЩ… Ш§Щ„Щ…Щ„Ш§ШӯШёШ§ШӘ</h3>'+r.findings.map(function(f){
      return '<div class="card decision" style="padding:10px 12px'+(f.severity==='warning'?';border-inline-start-color:var(--amber)':'')+'"><b>'+esc(f.text)+'</b>'+
        '<div class="muted small" style="margin-top:2px">'+esc(f.recommend)+' В· Ш№ЩҠЩ‘ЩҶШ© '+f.sample+'</div></div>';
    }).join('')); }
    out.push('<h3 style="margin:14px 2px 8px">Щ…ЩӮШ§ЩҠЩҠШі ШӘШҙШәЩҠЩ„ЩҠШ©</h3><div class="statrow three">'+
      tile('Ш§Щ„Щ…ЩҮШ§Щ… Ш§Щ„ШӯШұШ¬Ш©',(r.critical.pct==null?'вҖ”':r.critical.pct+'%'),r.critical.done+'/'+r.critical.total+' В· ЩҒШ§ШӘ '+r.critical.missed,r.critical.insufficient)+
      tile('ЩҲШіЩҠШ· ШұЩҒШ№ Ш§Щ„Щ…Ш§ЩҶШ№',r.blocker.median_min+' ШҜ','ШЈШ№Щ„Щү 90%: '+r.blocker.p90_min+' ШҜ В· '+r.blocker.count+' Щ…Ш§ЩҶШ№',r.blocker.insufficient)+
      tile('ЩҶШіШЁШ© Ш§Щ„ШӘШұШӯЩҠЩ„',r.carryover.pct+'%',r.carryover.total+' Щ…ЩҮЩ…Ш©',false)+'</div>');
    var fr=r.fairness;
    if((fr.rows||[]).length){ var mx=1; fr.rows.forEach(function(x){ if(x.total_weighted>mx) mx=x.total_weighted; });
      out.push('<h3 style="margin:14px 2px 8px">ШӘЩҲШІЩҠШ№ Ш§Щ„Ш№ШҜШ§Щ„Ш© вҖ” ШӯЩҗЩ…Щ„ Щ…ЩҲШІЩҲЩҶ + Ш№Щ…Щ„ Ш®ЩҒЩҠ</h3><div class="card" style="padding:12px">'+fr.rows.map(function(x){
        var pw=Math.round(100*x.total_weighted/mx);
        return '<div style="margin:0 0 8px"><div class="row" style="justify-content:space-between;font-size:13px"><span>'+esc(x.name)+(x.insufficient?' <span class="chip">Ш№ЩҠЩ‘ЩҶШ© ЩӮЩ„ЩҠЩ„Ш©</span>':'')+'</span>'+
          '<span class="num">'+x.total_weighted+' ШҜ'+(x.hidden_min?' В· Ш®ЩҒЩҠ '+x.hidden_min:'')+'</span></div><div class="pbar"><i style="width:'+pw+'%"></i></div></div>';
      }).join('')+'<div class="muted small" style="margin-top:6px">ШЈЩӮЩ„ Ш№ЩҠЩ‘ЩҶШ© Щ…Ш№ШӘЩ…ШҜШ© '+fr.min_sample+' ШҙЩҒШӘ В· Ш§Щ„ШӘШЁШ§ЩҠЩҶ '+fr.variance+' В· Щ„Ш§ ШӘШөЩҶЩҠЩҒ Ш№Щ„ЩҶЩҠ ШЁЩҠЩҶ Ш§Щ„Щ…ЩҲШёЩҒШ§ШӘ</div></div>');
    }
    out.push('<div class="muted small" style="margin:12px 2px;padding:10px;border:1px dashed var(--line);border-radius:10px">'+esc(r.rules.note)+'</div>');
    return out.join('');
  }
  function fetch2(){ var body=$('#ocBody'); if(!body) return; body.innerHTML=skel(3);
    var to=today(), from=addDays(to,-(preset-1));
    aAct('oc_analytics',{from:from,to:to}).then(function(r){ if(!r||!r.ok){ body.innerHTML='<div class="empty">ШӘШ№Ш°Щ‘Шұ Ш¬Щ„ШЁ Ш§Щ„ШӘШӯЩ„ЩҠЩ„Ш§ШӘ</div>'; return; } body.innerHTML=render(r); })

  v.innerHTML='<div class="row" style="gap:8px;margin-bottom:10px">'+[7,30,90].map(function(p){ return '<button class="btn sm'+(p===preset?'':' ghost')+'" data-p="'+p+'">'+(p===7?'Щ§ ШЈЩҠШ§Щ…':p===30?'ЩЈЩ  ЩҠЩҲЩ…':'Щ©Щ  ЩҠЩҲЩ…')+'</button>'; }).join('')+'</div><div id="ocBody">'+skel(3)+'</div>';

};

ADMIN.shifts=function(v){
  lookups(function(){
    var sel=today();
    // ШЁШҜШ§ЩҠШ© Ш§Щ„ШЈШіШЁЩҲШ№: Ш§Щ„ШіШЁШӘ
    function wk0(d){ var x=new Date(d+'T12:00:00'); return addDays(d, -((x.getDay()+1)%7)); }
    var wkStart=wk0(sel), week=[];
    var DW=['Ш§Щ„ШіШЁШӘ','Ш§Щ„ШЈШӯШҜ','Ш§Щ„Ш§Ш«ЩҶЩҠЩҶ','Ш§Щ„Ш«Щ„Ш§Ш«Ш§ШЎ','Ш§Щ„ШЈШұШЁШ№Ш§ШЎ','Ш§Щ„Ш®Щ…ЩҠШі','Ш§Щ„Ш¬Щ…Ш№Ш©'];
    v.innerHTML='<input type="hidden" id="shDay" value="'+sel+'">'+
      '<div class="row" style="gap:6px;align-items:stretch"><button class="btn sm ghost" id="wkPrev" aria-label="Ш§Щ„ШЈШіШЁЩҲШ№ Ш§Щ„ШіШ§ШЁЩӮ">вҖә</button>'+
      '<div class="wkstrip grow" id="wkStrip"></div>'+
      '<button class="btn sm ghost" id="wkNext" aria-label="Ш§Щ„ШЈШіШЁЩҲШ№ Ш§Щ„ШӘШ§Щ„ЩҠ">вҖ№</button></div>'+
      '<div class="btnrow" style="margin:10px 0 0"><button class="btn sm" id="shNew">+ ШҙЩҒШӘ</button><button class="btn sm ghost" id="shCopy">ЩҶШіШ® ЩҠЩҲЩ…</button></div>'+
      '<div id="shList" style="margin-top:10px"></div>';
    var cur=[];
    function paintStrip(){
      var tdy=today();
      $('#wkStrip').innerHTML=DW.map(function(nm,i){
        var d=addDays(wkStart,i), n=week.filter(function(s){return s.day===d && s.status!=='absent';}).length;
        return '<button class="wkd'+(d===sel?' on':'')+(d===tdy?' today':'')+'" data-wd="'+d+'"><span class="dw">'+nm+'</span><span class="dn num">'+(+d.slice(8))+'</span><span class="dc">'+(n? n+' ШҙЩҒШӘ':'вҖ”')+'</span></button>';
      }).join('');
      $$('[data-wd]',v).forEach(function(b){ b.addEventListener('click', function(){ sel=b.getAttribute('data-wd'); $('#shDay').value=sel; paintStrip(); paintDay(); }); });
    }
    function paintDay(){
      cur=week.filter(function(s){ return s.day===sel; });
      $('#shList').innerHTML = cur.length ? cur.map(function(s){
        return '<div class="card" style="padding:10px 12px'+(s.status==='absent'?';opacity:.55':'')+'"><div class="row" style="justify-content:space-between">'+
          '<div><b>'+esc(s.employee)+'</b> вҖ” '+esc(s.type||'Щ…Ш®ШөШө')+' В· '+esc(s.area||'ШЁЩ„Ш§ Щ…ЩҶШ·ЩӮШ©')+((s.extra_area_names&&s.extra_area_names.length)?' <span class="chip green">+ '+s.extra_area_names.map(esc).join(' + ')+'</span>':'')+(s.status==='absent'?' <span class="chip red">ШәЩҠШ§ШЁ</span>':'')+
          '<div class="muted small">'+fmtHM(s.start)+' вҶ’ '+fmtHM(s.end)+(s.daily_role?' В· '+esc(s.daily_role):'')+'</div></div>'+
          '<div class="btnrow" style="margin:0"><button class="btn sm ghost" data-edit="'+s.id+'">ШӘШ№ШҜЩҠЩ„</button><button class="btn sm ghost red" data-del="'+s.id+'">ШӯШ°ЩҒ</button></div></div></div>';
      }).join('') : '<div class="empty">Щ„Ш§ ШҙЩҒШӘШ§ШӘ вҖ” '+DW[(new Date(sel+'T12:00:00').getDay()+1)%7]+' '+fmtD(sel)+'</div>';
      $$('[data-del]',v).forEach(function(b){ b.addEventListener('click', function(){
        confirmSheet('ШӯШ°ЩҒ Ш§Щ„ШҙЩҒШӘ','ШіЩҠЩҸШӯШ°ЩҒ ЩҮШ°Ш§ Ш§Щ„ШҙЩҒШӘ Щ…Ш№ ШӯШ¶ЩҲШұЩҮ ЩҲЩ…ЩҮШ§Щ…ЩҮ Ш§Щ„Щ…ШұШӘШЁШ·Ш© ШЁЩҮ Щ„ЩҮШ°Ш§ Ш§Щ„ЩҠЩҲЩ….','ШӯШ°ЩҒ',function(){
          aAct('shift_delete',{id:+b.getAttribute('data-del')}).then(load);
        }, true);
      });});
      $$('[data-edit]',v).forEach(function(b){ b.addEventListener('click', function(){
        var s=null; cur.forEach(function(x){ if(x.id===+b.getAttribute('data-edit')) s=x; });
        if(s) form(s);
      });});
    }
    function load(){
      aAct('shifts_range',{from:wkStart,to:addDays(wkStart,6)}).then(function(res){
        week=res.shifts||[];
        // day ЩӮШҜ ЩҠШөЩ„ ШЁШӘЩҶШіЩҠЩӮШ§ШӘ Щ…Ш®ШӘЩ„ЩҒШ© вҖ” Ш·ШЁЩ‘Ш№ЩҠЩҮ ШҘЩ„Щү YYYY-MM-DD
        week.forEach(function(s){ if(s.day && s.day.length>10) s.day=s.day.slice(0,10); });
        paintStrip(); paintDay();
      });
    }
    $('#wkPrev').addEventListener('click', function(){ wkStart=addDays(wkStart,-7); sel=wkStart; $('#shDay').value=sel; load(); });
    $('#wkNext').addEventListener('click', function(){ wkStart=addDays(wkStart,7); sel=wkStart; $('#shDay').value=sel; load(); });
    function form(s){
      sheet(s ? 'ШӘШ№ШҜЩҠЩ„ ШҙЩҒШӘ вҖ” '+s.employee : 'ШҙЩҒШӘ Ш¬ШҜЩҠШҜ вҖ” '+$('#shDay').value,
        '<label class="f">Ш§Щ„Щ…ЩҲШёЩҒШ©</label><select class="f" id="sE" '+(s?'disabled':'')+'>'+staffOpts(s?s.employee_id:null)+'</select>'+
        '<label class="f">ЩҶЩҲШ№ Ш§Щ„ШҙЩҒШӘ</label><select class="f" id="sT">'+typeOpts(s?s.type_id:null)+'</select>'+
        '<label class="f">Ш§Щ„Щ…ЩҶШ·ЩӮШ© Ш§Щ„ШЈШіШ§ШіЩҠШ©</label><select class="f" id="sA">'+areaOpts(s?s.area_id:null)+'</select>'+
        '<label class="f">Щ…ЩҶШ§Ш·ЩӮ ШҘШ¶Ш§ЩҒЩҠШ© (ШЈШҜЩҲШ§Шұ Щ…ШӘШ№ШҜШҜШ© ШЁЩҶЩҒШі Ш§Щ„ШҙЩҒШӘ вҖ” Щ…Ш«Ш§Щ„: ЩғШ§Шҙ + Ш·Щ„ШЁШ§ШӘ)</label>'+
        '<div>'+(A.areas||[]).map(function(ax){
          var cur=(s&&s.extra_areas)||[];
          var on=false; cur.forEach(function(cv){ if(+cv===ax.id) on=true; });
          return '<label class="check" style="margin:4px 0"><input type="checkbox" class="xa" value="'+ax.id+'" '+(on?'checked':'')+'><span>'+esc(ax.name)+'</span></label>';
        }).join('')+'</div>'+
        '<div class="row"><div class="grow"><label class="f">ШЁШҜШ§ЩҠШ© Щ…Ш®ШөШөШ© (Ш§Ш®ШӘЩҠШ§ШұЩҠ)</label><input class="f" id="sS" type="time"></div>'+
        '<div class="grow"><label class="f">ЩҶЩҮШ§ЩҠШ© Щ…Ш®ШөШөШ© (Ш§Ш®ШӘЩҠШ§ШұЩҠ)</label><input class="f" id="sEn" type="time"></div></div>'+
        '<div class="muted small">Ш§ШӘШұЩғЩҠ Ш§Щ„ЩҲЩӮШӘЩҠЩҶ ЩҒШ§ШұШәЩҠЩҶ Щ„Ш§Ш№ШӘЩ…Ш§ШҜ ШЈЩҲЩӮШ§ШӘ ЩҶЩҲШ№ Ш§Щ„ШҙЩҒШӘ'+(s?' (Ш§Щ„ШӯШ§Щ„ЩҠ: '+fmtHM(s.start)+' вҶ’ '+fmtHM(s.end)+')':'')+'.</div>'+
        '<label class="f">ШҜЩҲШұ Ш§Щ„ЩҠЩҲЩ… (Ш¬Щ…Щ„Ш© Ш№Щ…Щ„ ШӯЩӮЩҠЩӮЩҠШ© вҖ” Щ„Ш§ ШҙШ№Ш§ШұШ§ШӘ)</label><input class="f" id="sR" placeholder="Щ…Ш«Ш§Щ„: Ш§Щ„ЩҠЩҲЩ… ШӘШ¶ШЁШ·ЩҠЩҶ ШіШұШ№Ш© ШӘШ¬ЩҮЩҠШІ Ш§Щ„ШЈШұШ§Ш¬ЩҠЩ„ ШӘШӯШӘ 6 ШҜЩӮШ§ШҰЩӮ" value="'+(s?esc(s.daily_role||''):'')+'">'+
        '<div class="btnrow"><button class="btn block" id="sGo">ШӯЩҒШё Ш§Щ„ШҙЩҒШӘ</button></div>',
        function(ov, close){

            if(en) p.end_time=en;
            busyWrap(this, function(){
              return aAct('shift_save',p).then(function(r){ if(r.ok){close();load();toast('ШӘЩ… вң”');} else toast(r.error||'Ш®Ш·ШЈ',true); });
            });
          });
        });

        '<label class="f">Ш§Щ„ЩҠЩҲЩ… Ш§Щ„Щ…ШөШҜШұ</label><input class="f" id="cpFrom" type="date" value="'+addDays($('#shDay').value,-1)+'">'+

        '<div class="btnrow"><button class="btn block" id="cpGo">ЩҶШіШ® Ш§Щ„Ш¬ШҜЩҲЩ„</button></div>',
        function(ov, close){

function taskOrderSheet(tid, name){

          return '<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--line);padding:7px 0"><div><b>'+(i+1)+'.</b> '+esc(o.name)+'</div>'+
            '<span class="btnrow" style="margin:0"><button class="btn sm ghost" data-up="'+i+'"'+(i===0?' disabled':'')+'>в–І</button><button class="btn sm ghost" data-dn="'+i+'"'+(i===order.length-1?' disabled':'')+'>в–ј</button><button class="btn sm ghost red" data-rm="'+i+'">ШӯШ°ЩҒ</button></span></div>';
        }).join(''):'<div class="muted small" style="padding:6px 0">Щ„Ш§ ШӘШұШӘЩҠШЁ Щ…ШӯШҜШҜ вҖ” Ш§Щ„ШӘЩҲШІЩҠШ№ Ш№Ш§ШҜЩ„ ШӘЩ„ЩӮШ§ШҰЩҠШ§ЩӢ.</div>');
        if(avail.length) h+='<label class="f" style="margin-top:10px">ШҘШ¶Ш§ЩҒШ© Щ…ЩҲШёЩҒШ© Щ„Щ„ШӘШұШӘЩҠШЁ</label><select class="f" id="ordAdd"><option value="">вҖ” Ш§Ш®ШӘШ§ШұЩҠ вҖ”</option>'+avail.map(function(e){return '<option value="'+e.id+'">'+esc(e.name)+'</option>';}).join('')+'</select>';
        h+='<div class="btnrow" style="margin-top:12px"><button class="btn block" id="ordSave">ШӯЩҒШё Ш§Щ„ШӘШұШӘЩҠШЁ</button></div>';

          }).join('')+
          '<div class="btnrow"><button class="btn block" id="tkRebal">ШӘЩҲШІЩҠШ№ ШӘЩ„ЩӮШ§ШҰЩҠ Щ…ШӘЩҲШ§ШІЩҶ (Ш§Щ„Щ…ЩҮШ§Щ… ШәЩҠШұ Ш§Щ„Щ…ШЁШҜЩҲШЎШ©)</button></div>';
        sheet('ШӘЩҲШ§ШІЩҶ Ш§Щ„ШӘЩҲШІЩҠШ№', html, function(ov, close){
