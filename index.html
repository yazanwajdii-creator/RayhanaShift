            busyWrap(this, function(){ return aAct('rebalance',{day:$('#tkDay').value}).then(function(r){ if(r.ok){ close(); toast('ШЈЩҸШ№ЩҠШҜ Ш§Щ„ШӘЩҲШІЩҠШ№ ШЁШ§Щ„ШӘЩҲШ§ШІЩҶ вң”'); load(); } else toast(r.error||'Ш®Ш·ШЈ',true); }); });
          });
        });
      });
    });
    $('#tkAssign').addEventListener('click', function(){
      sheet('ШҘШіЩҶШ§ШҜ Щ…ЩҮЩ…Ш© ШҘШ¶Ш§ЩҒЩҠШ©',
        '<label class="f">Ш§Щ„Щ…ЩҮЩ…Ш©</label><input class="f" id="qN">'+
        '<label class="f">Ш§Щ„Щ…ЩҲШёЩҒШ©</label><select class="f" id="qE">'+staffOpts()+'</select>'+
        '<label class="f">Ш§Щ„Щ…ЩҶШ·ЩӮШ©</label><select class="f" id="qA">'+areaOpts()+'</select>'+
        '<label class="f">ШҜЩӮШ§ШҰЩӮ Щ…ШӘЩҲЩӮШ№Ш©</label><input class="f" id="qX" type="number" value="10">'+
        '<div class="check"><input type="checkbox" id="qC"><span>ШЈШіШ§ШіЩҠШ© (ШӘЩ…ЩҶШ№ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ)</span></div>'+
        '<div class="btnrow"><button class="btn block" id="qGo">ШҘШіЩҶШ§ШҜ</button></div>',
        function(ov, close){
          $('#qGo',ov).addEventListener('click', function(){
            var nm=$('#qN',ov).value.trim();
            if(!nm){ toast('Ш§ЩғШӘШЁЩҠ Ш§ШіЩ… Ш§Щ„Щ…ЩҮЩ…Ш©', true); return; }
            busyWrap(this, function(){
              return aAct('task_assign',{day:$('#tkDay').value, name:nm, employee_id:+$('#qE',ov).value, area_id:+$('#qA',ov).value, expected:+$('#qX',ov).value, is_core:$('#qC',ov).checked})
                .then(function(r){ if(r.ok){close();load();toast('ШӘЩ… Ш§Щ„ШҘШіЩҶШ§ШҜ вң”');} else toast(r.error||'Ш®Ш·ШЈ',true); });
            });
          });
        });
    });
    load();
  });
};

ADMIN.attendance=function(v){
  v.innerHTML='<input class="f" id="atDay" type="date" value="'+today()+'"><div id="atBody" style="margin-top:10px"></div>';
  function load(){
    aAct('attendance_day',{day:$('#atDay').value}).then(function(res){
      var out=[];
      var fixes=(res.fixes||[]).filter(function(f){return f.status==='pending';});
      if(fixes.length){
        out.push('<h3>ШӘШ№ШҜЩҠЩ„Ш§ШӘ В«ЩҶШіЩҠШӘ ШЈШіШ¬Щ„В» вҖ” ШӘШӯШӘШ§Ш¬ ЩӮШұШ§ШұЩғ ('+fixes.length+')</h3>');
        fixes.forEach(function(f){
          out.push('<div class="card beige" style="padding:10px 12px"><b>'+esc(f.employee)+'</b> вҖ” '+(f.kind==='in'?'ЩҶШіЩҠШӘ Ш§Щ„ШӯШ¶ЩҲШұ':'ЩҶШіЩҠШӘ Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ')+' В· ЩҲЩӮШӘ ШӘЩӮШұЩҠШЁЩҠ '+fmtT(f.approx)+
            '<div class="small muted">'+esc(f.reason||'')+'</div>'+
            '<div class="btnrow"><button class="btn sm" data-fa="'+f.id+'">Ш§Ш№ШӘЩ…Ш§ШҜ Ш§Щ„ЩҲЩӮШӘ Ш§Щ„ШӘЩӮШұЩҠШЁЩҠ</button><button class="btn sm ghost red" data-fr="'+f.id+'">ШұЩҒШ¶</button></div></div>');
        });
      }
      out.push('<h3 style="margin-top:8px">ШӯШ¶ЩҲШұ Ш§Щ„ЩҠЩҲЩ…</h3><div class="scrollx"><table class="tbl"><tr><th>Ш§Щ„Щ…ЩҲШёЩҒШ©</th><th>Ш§Щ„Щ…ЩҶШ·ЩӮШ©</th><th>ШӯШ¶ЩҲШұ</th><th>Ш§ЩҶШөШұШ§ЩҒ</th><th>ШӘШЈШ®ЩҠШұ</th><th>ШҘШ¶Ш§ЩҒЩҠ</th><th>ШӘШӯЩӮЩӮ</th><th>ШӘШ№ШҜЩҠЩ„</th></tr>'+
        (res.rows||[]).map(function(r,ri){
          return '<tr><td><b>'+esc(r.employee)+'</b></td><td>'+esc(r.area||'вҖ”')+'</td><td>'+fmtT(r['in'])+'</td><td>'+fmtT(r.out)+'</td><td>'+(r.late>0?'<span class="chip orange">'+r.late+' ШҜ</span>':'вҖ”')+'</td><td>'+(r.ot>0?r.ot+' ШҜ':'вҖ”')+'</td><td>'+((r.in_selfie||r.out_selfie)?'<button class="btn sm ghost" data-selfie="'+ri+'"></button>':'вҖ”')+'</td><td><button class="btn sm ghost" data-edat="'+ri+'">ШӘШ№ШҜЩҠЩ„</button></td></tr>';
        }).join('')+'</table></div>');
      var posts=(res.postpones||[]).filter(function(p){return !p.compensated;});
      if(posts.length){
        out.push('<h3 style="margin-top:12px">Ш§ШіШӘШұШ§ШӯШ§ШӘ Щ…ШӨШ¬Щ„Ш© ШәЩҠШұ Щ…Ш№ЩҲЩҺЩ‘Ш¶Ш©</h3>');
        posts.forEach(function(p){
          out.push('<div class="card" style="padding:9px 12px"><div class="row" style="justify-content:space-between"><div><b>'+esc(p.employee)+'</b> <span class="muted small">'+esc(p.reason||'')+' В· '+fmtD(p.ts)+'</span></div><button class="btn sm ghost" data-comp="'+p.id+'">Ш№ЩҸЩҲЩҗЩ‘Ш¶ШӘ вң”</button></div></div>');
        });
      }
      var brs=res.breaks||[];
      if(brs.length){
        out.push('<h3 style="margin-top:12px">Ш§ШіШӘШұШ§ШӯШ§ШӘ Ш§Щ„ЩҠЩҲЩ…</h3><div class="card" style="padding:8px 12px">'+brs.map(function(b){
          return '<div class="small" style="padding:3px 0">'+esc(b.employee)+': '+fmtT(b.start)+' вҶ’ '+(b.end?fmtT(b.end):'<span class="chip orange">Щ…ЩҒШӘЩҲШӯШ©</span>')+'</div>';
        }).join('')+'</div>');
      }
      $('#atBody').innerHTML=out.join('');
      $$('[data-fa]',v).forEach(function(b){ b.addEventListener('click', function(){ aAct('fix_decide',{id:+b.getAttribute('data-fa'),decision:'approve'}).then(load); });});
      $$('[data-fr]',v).forEach(function(b){ b.addEventListener('click', function(){
        inputSheet('ШұЩҒШ¶ Ш§Щ„ШӘШ№ШҜЩҠЩ„','ШіШЁШЁ Ш§Щ„ШұЩҒШ¶','ЩҠШёЩҮШұ Щ„Щ„Щ…ЩҲШёЩҒШ©','ШұЩҒШ¶',function(note){
          aAct('fix_decide',{id:+b.getAttribute('data-fr'),decision:'reject',note:note}).then(load);
        });
      });});
      $$('[data-comp]',v).forEach(function(b){ b.addEventListener('click', function(){ aAct('postpone_compensate',{id:+b.getAttribute('data-comp')}).then(load); });});
      $$('[data-selfie]',v).forEach(function(b){ b.addEventListener('click', function(){
        var r=(res.rows||[])[+b.getAttribute('data-selfie')]; if(!r) return;
        function geoTxt(g){ return g&&g.lat ? ''+g.lat+', '+g.lng+(g.acc?' (Вұ'+g.acc+'Щ…)':'') : 'ШЁШҜЩҲЩҶ Щ…ЩҲЩӮШ№'; }
        sheet('ШөЩҲШұ Ш§Щ„ШӘШӯЩӮЩӮ вҖ” '+r.employee,
          (r.in_selfie?'<b>Ш§Щ„ШӯШ¶ЩҲШұ '+fmtT(r['in'])+'</b><div class="small muted">'+geoTxt(r.in_geo)+'</div><img src="'+r.in_selfie+'" style="width:100%;border-radius:12px;margin:6px 0">':'<div class="muted small">Щ„Ш§ ШөЩҲШұШ© ШӯШ¶ЩҲШұ</div>')+
          (r.out_selfie?'<hr class="sep"><b>Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ '+fmtT(r.out)+'</b><div class="small muted">'+geoTxt(r.out_geo)+'</div><img src="'+r.out_selfie+'" style="width:100%;border-radius:12px;margin:6px 0">':''));
      });});
      $$('[data-edat]',v).forEach(function(b){ b.addEventListener('click', function(){
        var r=(res.rows||[])[+b.getAttribute('data-edat')]; if(r) attEdit(r);
      });});
    });
  }
  function attEdit(r){
    if(!r.shift_id){ toast('Щ„Ш§ ЩҠЩ…ЩғЩҶ Ш§Щ„ШӘШ№ШҜЩҠЩ„ вҖ” Щ„Ш§ ЩҠЩҲШ¬ШҜ ШҙЩҒШӘ Щ…ШұШӘШЁШ·', true); return; }
    sheet('ШӘШ№ШҜЩҠЩ„ ЩҲЩӮШӘ вҖ” '+esc(r.employee),
      '<div class="muted small">Ш§Щ„ШЈЩҲЩӮШ§ШӘ ШЁШӘЩҲЩӮЩҠШӘ Ш№Щ…Щ‘Ш§ЩҶ. Ш§ШӘШұЩғЩҠ Ш§Щ„ШӯЩӮЩ„ ЩҒШ§ШұШәШ§ЩӢ Щ„Ш№ШҜЩ… ШӘШәЩҠЩҠШұЩҮ.</div>'+
      '<label class="f">Ш§Щ„ШӯШ¶ЩҲШұ</label><input class="f" id="edIn" type="time" value="'+(r['in']?fmtT(r['in']):'')+'">'+
      '<label class="f">Ш§Щ„Ш§ЩҶШөШұШ§ЩҒ</label><input class="f" id="edOut" type="time" value="'+(r.out?fmtT(r.out):'')+'">'+
      '<div class="btnrow"><button class="btn block" id="edGo">ШӯЩҒШё</button></div>',
      function(ov, close){
        $('#edGo',ov).addEventListener('click', function(){
          busyWrap(this, function(){ return aAct('attendance_set',{shift_id:r.shift_id, in:$('#edIn',ov).value, out:$('#edOut',ov).value}).then(function(res){
            if(res.ok){ close(); toast('ШӘЩ… ШӘШ№ШҜЩҠЩ„ Ш§Щ„ЩҲЩӮШӘ вң”'); load(); } else toast(res.error||'Ш®Ш·ШЈ', true);
          }); });
        });
      });
  }
  $('#atDay').addEventListener('change', load); load();
};

ADMIN.skills=function(v){
  aAct('skills_matrix',{}).then(function(res){
    if(!res.ok){ v.innerHTML='<div class="empty">'+esc(res.error||'Ш®Ш·ШЈ')+'</div>'; return; }
    var out=[];
    out.push('<div class="card beige"><h3>ШӘШәШ·ЩҠШ© Ш§Щ„Щ…ЩҮШ§ШұШ§ШӘ Ш§Щ„ШӯШұШ¬Ш©</h3>'+
      (res.coverage||[]).map(function(c){
        var h=c.holders||[];
        return '<div class="row" style="justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line)"><b>'+esc(c.skill)+'</b>'+
          '<span>'+(h.length? h.map(function(n){return '<span class="chip green" style="margin:1px">'+esc(n)+'</span>';}).join('') : '<span class="chip red">Щ„Ш§ Щ…Ш№ШӘЩ…ШҜШ©!</span>')+'</span></div>';
      }).join('')+'<div class="muted small" style="margin-top:6px">Ш§Щ„ЩҮШҜЩҒ: ШЈШіШ§ШіЩҠШ© + ШЁШҜЩҠЩ„Ш© ШЈЩҲЩ„Щү ЩҲШ«Ш§ЩҶЩҠШ© Щ„ЩғЩ„ Щ…ЩҮШ§ШұШ© ШӯШұШ¬Ш© вҖ” ЩҮЩғШ°Ш§ Щ„Ш§ ШӘЩҸШіШӘЩҶШІЩҒ Щ…ЩҲШёЩҒШ© ЩҲШ§ШӯШҜШ©.</div></div>');
    var emps=res.employees||[], skills=res.skills||[], mx={};
    (res.matrix||[]).forEach(function(m){ mx[m.employee_id+'-'+m.skill_id]=m; });
    out.push('<div class="scrollx"><table class="tbl"><tr><th>Ш§Щ„Щ…ЩҲШёЩҒШ© \\ Ш§Щ„Щ…ЩҮШ§ШұШ©</th>'+skills.map(function(s){return '<th>'+esc(s.name)+(s.critical?'':'')+'</th>';}).join('')+'</tr>'+
      emps.map(function(e){
        return '<tr><td><b>'+esc(e.name)+'</b></td>'+skills.map(function(s){
          var m=mx[e.id+'-'+s.id];
          var txt = m ? (m.level+(m.approved?'вң”':'вҸі')+(m.can_train?'':'')) : 'В·';
          return '<td style="cursor:pointer;text-align:center" data-es="'+e.id+'-'+s.id+'">'+txt+'</td>';
        }).join('')+'</tr>';
      }).join('')+'</table></div><div class="muted small" style="margin-top:6px">вң” Щ…Ш№ШӘЩ…ШҜШ© В· вҸі ШЁШ§ЩҶШӘШёШ§Шұ Ш§Щ„Ш§Ш№ШӘЩ…Ш§ШҜ В· ЩҠШӯЩӮ Щ„ЩҮШ§ Ш§Щ„ШӘШҜШұЩҠШЁ вҖ” Ш§Ш¶ШәШ·ЩҠ ШЈЩҠ Ш®Щ„ЩҠШ© Щ„Щ„ШӘШ№ШҜЩҠЩ„</div>');
    v.innerHTML=out.join('');
    $$('[data-es]',v).forEach(function(td){
      td.addEventListener('click', function(){
        var pp=td.getAttribute('data-es').split('-'), eid=+pp[0], sid=+pp[1];

ADMIN.reports=function(v){
  var d=today(), d7=new Date(Date.now()-6*864e5), from=d7.getFullYear()+'-'+('0'+(d7.getMonth()+1)).slice(-2)+'-'+('0'+d7.getDate()).slice(-2);
  v.innerHTML='<div class="row">'+
    '<select class="f grow" id="rpT"><option value="attendance">Ш§Щ„ШӯШ¶ЩҲШұ ЩҲШ§Щ„Ш§Щ„ШӘШІШ§Щ…</option><option value="tasks">Ш§Щ„Щ…ЩҮШ§Щ…</option><option value="pressure">Ш§Щ„Ш¶ШәШ·</option><option value="coverage">Ш§Щ„ШӘШәШ·ЩҠШ§ШӘ</option><option value="forgets">Ш§Щ„ЩҶШіЩҠШ§ЩҶ</option></select></div>'+
    '<div class="row" style="margin-top:8px"><input class="f grow" id="rpF" type="date" value="'+from+'"><input class="f grow" id="rpTo" type="date" value="'+d+'"><button class="btn sm" id="rpGo">Ш№ШұШ¶</button></div>'+
    '<div id="rpB" style="margin-top:10px"></div>';
  var COLS={employee:'Ш§Щ„Щ…ЩҲШёЩҒШ©', days:'ШЈЩҠШ§Щ… ШӯШ¶ЩҲШұ', late_times:'Щ…ШұШ§ШӘ Ш§Щ„ШӘШЈШ®ЩҠШұ', late_min:'ШҜЩӮШ§ШҰЩӮ Ш§Щ„ШӘШЈШ®ЩҠШұ',
    ot_min:'ШҜЩӮШ§ШҰЩӮ ШҘШ¶Ш§ЩҒЩҠШ©', early_min:'Ш§ЩҶШөШұШ§ЩҒ Щ…ШЁЩғШұ (ШҜ)', total:'Ш§Щ„ШҘШ¬Щ…Ш§Щ„ЩҠ', done:'Щ…ЩҶШ¬ШІШ©', returned:'Щ…Ш№Ш§ШҜШ©',
    avg_net_min:'Щ…ШӘЩҲШіШ· Ш§Щ„ШөШ§ЩҒЩҠ (ШҜ)', area:'Ш§Щ„Щ…ЩҶШ·ЩӮШ©', day:'Ш§Щ„ЩҠЩҲЩ…', peak:'Ш°ШұЩҲШ© Ш§Щ„ШҘШҙШәШ§Щ„', updates:'Ш§Щ„ШӘШӯШҜЩҠШ«Ш§ШӘ',
    support_calls:'ЩҶШҜШ§ШЎШ§ШӘ Ш§Щ„ШҜШ№Щ…', count:'Ш§Щ„Ш№ШҜШҜ', kinds:'Ш§Щ„ШЈЩҶЩҲШ§Ш№'};
  function cellVal(x){ if(x===null||x===undefined) return 'вҖ”'; if(typeof x==='object') return Array.isArray(x)?x.join('ШҢ '):JSON.stringify(x); return String(x); }
  $('#rpGo').addEventListener('click', function(){
    $('#rpB').innerHTML=skel(3);
    aAct('report',{type:$('#rpT').value, from:$('#rpF').value, to:$('#rpTo').value}).then(function(res){
      if(!res.ok){ $('#rpB').innerHTML='<div class="empty">'+esc(res.error||'Ш®Ш·ШЈ')+'</div>'; return; }
      var rows=res.rows||[];
      if(!rows.length){ $('#rpB').innerHTML='<div class="empty">Щ„Ш§ ШЁЩҠШ§ЩҶШ§ШӘ ШЁЩҮШ°Ш§ Ш§Щ„ЩҶШ·Ш§ЩӮ</div>'; return; }
      var keys=Object.keys(rows[0]);
      /* Щ…ШӨШҙШұШ§ШӘ Щ…Ш®ШӘШөШұШ© ШЈШ№Щ„Щү Ш§Щ„ШӘЩӮШұЩҠШұ */
      var SUMK=['days','late_min','ot_min','done','total','returned','count','support_calls','late_times'];
      var sums={}; keys.forEach(function(k){ if(SUMK.indexOf(k)>-1){ var s=0,num=true; rows.forEach(function(r){ var x=+r[k]; if(isNaN(x)) num=false; else s+=x; }); if(num) sums[k]=s; } });
      var kpiKeys=Object.keys(sums).slice(0,3);
      var kpi = kpiKeys.length ? '<div class="statrow three">'+kpiKeys.map(function(k){return '<div class="stat"><b class="num">'+sums[k]+'</b><span>'+esc(COLS[k]||k)+' (ШҘШ¬Щ…Ш§Щ„ЩҠ)</span></div>';}).join('')+'</div>' : '';
      /* ШЁШ·Ш§ЩӮШ§ШӘ ЩӮШ§ШЁЩ„Ш© Щ„Щ„ШӘЩҲШіШ№Ш© ШЁШҜЩ„ Ш¬ШҜЩҲЩ„ ЩғШ«ЩҠЩҒ */
      var TITLE_KEYS=['employee','area','day'];
      var tk=null; TITLE_KEYS.forEach(function(k){ if(!tk && keys.indexOf(k)>-1) tk=k; }); tk=tk||keys[0];
      var rest=keys.filter(function(k){return k!==tk;});
      $('#rpB').innerHTML=kpi+
        '<div class="btnrow" style="margin-bottom:8px"><span class="chip">'+rows.length+' ШіШ¬Щ„</span><button class="btn sm ghost" id="rpCsv">ШӘШөШҜЩҠШұ CSV</button></div>'+
        rows.map(function(r){
          var top=rest.slice(0,2).map(function(k){return esc(COLS[k]||k)+': <b class="num">'+esc(cellVal(r[k]))+'</b>';}).join(' В· ');
          return '<details class="qa"><summary><span>'+esc(cellVal(r[tk]))+'<span class="nl-sub" style="display:block;font-size:12px;font-weight:400;color:var(--muted)">'+top+'</span></span></summary><div class="qa-body">'+
            rest.map(function(k){ return '<div class="row" style="justify-content:space-between;border-bottom:1px dashed var(--line);padding:5px 0"><span class="muted small">'+esc(COLS[k]||k)+'</span><b class="num">'+esc(cellVal(r[k]))+'</b></div>'; }).join('')+
          '</div></details>';
        }).join('');
      $('#rpCsv').addEventListener('click', function(){
        var lines=[keys.map(function(k){return '"'+(COLS[k]||k).replace(/"/g,'""')+'"';}).join(',')];
        rows.forEach(function(r){ lines.push(keys.map(function(k){ return '"'+cellVal(r[k]).replace(/"/g,'""')+'"'; }).join(',')); });
        var blob=new Blob(['п»ҝ'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
        var aL=document.createElement('a');
        aL.href=URL.createObjectURL(blob);
        aL.download='ШӘЩӮШұЩҠШұ-'+$('#rpT').value+'-'+$('#rpF').value+'-'+$('#rpTo').value+'.csv';
        document.body.appendChild(aL); aL.click();
        setTimeout(function(){ URL.revokeObjectURL(aL.href); aL.remove(); }, 500);
      });
    });
  });
};

/* ---------- ШЁШ«Щ‘ ШөЩҲШӘЩҠ Щ…ЩҶ Ш§Щ„ШҘШҜШ§ШұШ© Щ„Щ„ЩҒШұЩҠЩӮ ---------- */
var ADMCAST={recording:false,t0:0};
function admCastStart(btn){
  if(ADMCAST.recording) return;
  if(!recSupported()){ toast('Ш§Щ„ШӘШіШ¬ЩҠЩ„ ШәЩҠШұ Щ…ШҜШ№ЩҲЩ… ЩҮЩҶШ§',true); return; }
  ADMCAST.recording=true; ADMCAST.t0=Date.now(); btn.classList.add('rec'); btn.textContent='ЩҠШіШ¬Щ‘Щ„вҖҰ ШЈЩҒЩ„ШӘЩҠ Щ„Щ„ШҘШұШіШ§Щ„'; recOverlay(true);
  clearTimeout(ADMCAST._max); ADMCAST._max=setTimeout(function(){ if(ADMCAST.recording) admCastStop(btn); }, 15000);
  recStart().then(function(){ if(!ADMCAST.recording){ recStop(); recOverlay(false); } })
   .catch(function(){ ADMCAST.recording=false; recOverlay(false); btn.classList.remove('rec'); btn.textContent='Ш§Ш¶ШәШ·ЩҠ Щ…Ш№ Ш§Щ„Ш§ШіШӘЩ…ШұШ§Шұ Щ„Щ„ШЁШ«Щ‘ Ш§Щ„ШөЩҲШӘЩҠ'; toast('Ш§ШіЩ…ШӯЩҠ ШЁШ§Щ„ЩҲШөЩҲЩ„ Щ„Щ„Щ…ЩҠЩғШұЩҲЩҒЩҲЩҶ',true); });
}
function admCastStop(btn){
  if(!ADMCAST.recording) return;
  ADMCAST.recording=false; clearTimeout(ADMCAST._max); btn.classList.remove('rec'); recOverlay(false);
  var dur=(Date.now()-ADMCAST.t0)/1000; var wav=recStop();
  var reset=function(){ btn.textContent='Ш§Ш¶ШәШ·ЩҠ Щ…Ш№ Ш§Щ„Ш§ШіШӘЩ…ШұШ§Шұ Щ„Щ„ШЁШ«Щ‘ Ш§Щ„ШөЩҲШӘЩҠ'; };
  if(!wav || dur<0.35){ reset(); return; }
  if(wav.length>420000){ toast('Ш§Щ„Щ…ЩӮШ·Ш№ Ш·ЩҲЩҠЩ„ вҖ” ШЈШЁЩӮЩҠЩҮ ШЈЩӮШөШұ',true); reset(); return; }
  btn.textContent='вҖҰ ЩҠЩҸШұШіЩ„';
  aAct('ptt_broadcast',{audio:wav,dur:Math.round(dur*10)/10}).then(function(r){
    if(r&&r.ok){ toast('ЩҲШөЩ„ ШЁШ«Щ‘Щғ Щ„ЩҖ '+(r.reached||0)+' Ш№Щ„Щү Ш§Щ„ШҙЩҒШӘ'); }
    else toast((r&&r.error)||'ШӘШ№Ш°Щ‘Шұ Ш§Щ„ШЁШ«Щ‘',true); reset();
  }).catch(function(){ toast('Щ„Ш§ Ш§ШӘШөШ§Щ„',true); reset(); });
}

      var areas=[], hset={}, maxc=1, key={};

      areas.forEach(function(a){

        }).join('')+'</tr>';
      });

        var c=key[bt.getAttribute('data-a')+'|'+bt.getAttribute('data-h')]; if(!c) return;

ADMIN.analytics=function(v){
  aAct('analytics',{}).then(function(res){
    if(!res.ok){ v.innerHTML='<div class="empty">'+esc(res.error||'Ш®Ш·ШЈ')+'</div>'; return; }
    var out=['<div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px"><span class="muted small">ШўШ®Шұ 28 ЩҠЩҲЩ…Ш§ЩӢ</span><button class="btn sm ghost" id="anExp">ШӘШөШҜЩҠШұ ЩҶШіШ®Ш© (JSON)</button></div>'];
    // Ш®ШұЩҠШ·Ш© Ш§Щ„Ш¶ШәШ· ШЁШ§Щ„ШіШ§Ш№Ш©/Ш§Щ„ЩҠЩҲЩ…
    var DOW=['ШЈШӯШҜ','ШҘШ«ЩҶ','Ш«Щ„Ш§','ШЈШұШЁ','Ш®Щ…ЩҠ','Ш¬Щ…Ш№','ШіШЁШӘ'];
    var hm=res.heatmap||[], maxv=1; hm.forEach(function(c){ if(c.peak>maxv) maxv=c.peak; });
    if(hm.length){
      var grid={}; hm.forEach(function(c){ grid[c.dow+'-'+c.hour]=c.peak; });
      var hours=[]; for(var h=8;h<=23;h++) hours.push(h);
      var tbl='<div class="scrollx"><table class="tbl" style="font-size:11px"><tr><th></th>'+hours.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr>';
      for(var dw=0;dw<7;dw++){
        tbl+='<tr><td><b>'+DOW[dw]+'</b></td>'+hours.map(function(h){
          var val=grid[dw+'-'+h]||0, op=val/maxv;
          return '<td style="background:rgba(62,107,76,'+(op*0.85).toFixed(2)+');color:'+(op>0.5?'#fff':'inherit')+';text-align:center">'+(val||'')+'</td>';
        }).join('')+'</tr>';

      ((res.rows||[]).map(function(f){
        return '<div class="card" style="padding:10px 12px'+(f.status!=='open'?';opacity:.55':'')+'"><b>'+esc(f.employee||'вҖ”')+'</b>: '+esc(FK[f.kind]||f.kind)+
          '<div class="small muted" style="direction:ltr;text-align:left">'+esc(JSON.stringify(f.detail||{}))+'</div>'+
          '<div class="muted small">'+fmtD(f.ts)+' В· '+esc(f.status)+'</div>'+
          (f.status==='open'?'<div class="btnrow"><button class="btn sm ghost" data-fd="'+f.id+'" data-d="dismissed">Ш§Ш·Щ‘Щ„Ш№ШӘ вҖ” ШіЩ„ЩҠЩ…</button><button class="btn sm ghost red" data-fd="'+f.id+'" data-d="reviewed">ШӘЩ…ШӘ Щ…ШӘШ§ШЁШ№Ш©</button></div>':'')+'</div>';
      }).join('')||'<div class="empty">Щ„Ш§ ШҘШҙШ§ШұШ§ШӘ</div>');
    $$('[data-fd]',v).forEach(function(b){ b.addEventListener('click', function(){
      aAct('flag_decide',{id:+b.getAttribute('data-fd'), decision:b.getAttribute('data-d')}).then(function(){ ADMIN.flags(v); });
    });});
  });
};

/* ============================ Ш§Щ„ШҘЩӮЩ„Ш§Ш№ ============================ */
// ШӘШӯШҜЩҠШ« ШӘЩ„ЩӮШ§ШҰЩҠ: Ш№ЩҶШҜ ШӘШәЩҠЩ‘Шұ ЩҶШіШ®Ш© Ш§Щ„ШЁЩҶШ§ШЎ ЩҠЩҸЩҶШёЩҺЩ‘ЩҒ Ш§Щ„ЩғШ§Шҙ Ш§Щ„ЩӮШҜЩҠЩ… Ш°Ш§ШӘЩҠШ§ЩӢ ШҜЩҲЩҶ ШӘШҜШ®Щ„
(function(){
  try{
    var prev=localStorage.getItem('rko_build');
    if(prev && prev!==BUILD){
      localStorage.removeItem('rko_state');   // ЩғШ§Шҙ Ш§Щ„Ш№ШұШ¶ ЩҒЩӮШ· вҖ” Ш§Щ„Ш¬Щ„ШіШ© ШӘШЁЩӮЩү
      if('caches' in window){ caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }); }
    }
    localStorage.setItem('rko_build', BUILD);
  }catch(e){}
  // ШҜШ№Щ… ШұШ§ШЁШ· Ш§Щ„Ш·ЩҲШ§ШұШҰ ?reset=1 (Ш§Ш®ШӘЩҠШ§ШұЩҠ) ШҜЩҲЩҶ Ш§Щ„Ш§Ш№ШӘЩ…Ш§ШҜ Ш№Щ„ЩҠЩҮ
  var q=location.search||'';
  if(q.indexOf('reset=')>-1){
    try{ localStorage.removeItem('rko_sess'); localStorage.removeItem('rko_state'); localStorage.removeItem('rko_q');
      if(q.indexOf('reset=all')>-1){ localStorage.removeItem('rko_key'); localStorage.removeItem('rko_devtok'); } }catch(e){}
    history.replaceState(null,'',location.pathname);
  }
})();
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; });
/* ШӘШӯШҜЩҠШ« ШӘЩ„ЩӮШ§ШҰЩҠ Щ„Щ„Ш¬Щ…ЩҠШ№: ЩҠШіШӯШЁ ШЈШӯШҜШ« ЩҶШіШ®Ш© ЩҒЩҲШұ ЩҶШҙШұЩҮШ§ ШҜЩҲЩҶ ШӘШҜШ®Щ„ Щ…ЩҶ Ш§Щ„Щ…ШіШӘШ®ШҜЩ… */
var _upBusy=false;
function checkUpdate(){
  if(_upBusy) return; _upBusy=true;
  try{
    fetch('version.json?t='+Date.now(), {cache:'no-store'}).then(function(r){ return r.ok?r.json():null; }).then(function(j){
      _upBusy=false;
      if(j && j.build && j.build!==BUILD){
        try{ localStorage.removeItem('rko_state'); }catch(e){}
        if('caches' in window){ caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); }).then(function(){ location.reload(); }); }
        else location.reload();
      }
    }).catch(function(){ _upBusy=false; });
  }catch(e){ _upBusy=false; }
}
setInterval(checkUpdate, 150000);
document.addEventListener('visibilitychange', function(){ if(!document.hidden) checkUpdate(); });
window.addEventListener('focus', checkUpdate);
function applyFont(){ try{ document.documentElement.classList.toggle('font-lg', localStorage.getItem('rko_font')==='lg'); }catch(e){} }
function boot(){
  applyTheme(); applyFont();
  var K=getKey();
  if(!K || K.indexOf('ЩҮЩҶШ§')>-1){
    document.body.className='no-nav';
    APP.innerHTML='<div class="login-hero"><div class="logo">Шұ</div><h1 style="font-size:24px;margin:0">ШұЩҠШӯШ§ЩҶШ©</h1><div style="opacity:.75;font-size:13.5px">ШҘШ№ШҜШ§ШҜ ШЈЩҲЩ„ Щ…ШұШ©</div></div>'+
      '<div class="wrap"><div class="card" style="margin-top:14px"><h3>ШұШЁШ· ЩӮШ§Ш№ШҜШ© Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ</h3>'+
      '<div class="small muted">Щ…ЩҶ Supabase: Settings вҶҗ API вҶҗ Ш§ЩҶШіШ®ЩҠ Щ…ЩҒШӘШ§Шӯ <b>anon public</b> ЩҲШ§Щ„ШөЩӮЩҠЩҮ ЩҮЩҶШ§. ЩҠЩҸШӯЩҒШё Ш№Щ„Щү ЩҮШ°Ш§ Ш§Щ„Ш¬ЩҮШ§ШІ ЩҒЩӮШ· ЩҲЩ„Ш§ ЩҠЩҸШ·Щ„ШЁ Щ…ШұШ© ШЈШ®ШұЩү.</div>'+
      '<label class="f">Щ…ЩҒШӘШ§Шӯ anon</label><textarea class="f" id="setKey" style="direction:ltr;text-align:left;font-size:12px"></textarea>'+
      '<div class="btnrow"><button class="btn block" id="setGo">ШӯЩҒШё ЩҲШЁШҜШЎ Ш§Щ„ШӘШҙШәЩҠЩ„</button></div></div></div>';
    $('#setGo').addEventListener('click', function(){
      var k=$('#setKey').value.trim();
      if(k.length<30){ toast('Ш§Щ„Щ…ЩҒШӘШ§Шӯ ШәЩҠШұ Щ…ЩғШӘЩ…Щ„', true); return; }
      try{ localStorage.setItem('rko_key', k); }catch(e){}
      boot2();
    });
    return;
  }
  boot2();
}
function boot2(){
  loadSess();
  if(S.token && S.role==='staff') startStaff();
  else if(S.token && S.role==='admin') startAdmin();
  else renderLogin();
}
// Ш№Ш§Щ…Щ„ Ш§Щ„Ш®ШҜЩ…Ш©: ЩҠШ®ШІЩҶ Ш§Щ„ЩҮЩҠЩғЩ„ Щ„Щ„Ш№Щ…Щ„ ШҜЩҲЩҶ Ш§ШӘШөШ§Щ„ ЩҲЩҠШӘЩҠШӯ Ш§Щ„ШӘШ«ШЁЩҠШӘ Ш№Щ„Щү Ш§Щ„ШҙШ§ШҙШ© Ш§Щ„ШұШҰЩҠШіЩҠШ©
// ШҘШІШ§Щ„Ш© ШЈЩҠ Ш№Ш§Щ…Щ„ Ш®ШҜЩ…Ш© ЩӮШҜЩҠЩ… Ш№Ш§Щ„ЩӮ + ШӘЩҶШёЩҠЩҒ Ш§Щ„ЩғШ§Шҙ Щ„Ш¶Щ…Ш§ЩҶ ЩҒШӘШӯ Ш§Щ„Щ…ЩҲЩӮШ№ ШҜШ§ШҰЩ…Ш§ЩӢ ШЁШЈШӯШҜШ« ЩҶШіШ®Ш©
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
}
if('caches' in window){ caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }).catch(function(){}); }
boot();
})();
</script>
